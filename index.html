<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bad News Bot - 3D Avatar with Lip-Sync</title>
  
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
      "talkinghead": "https://cdn.jsdelivr.net/gh/met4citizen/TalkingHead@1.7/modules/talkinghead.mjs"
    }
  }
  </script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; min-height: 100vh; overflow: hidden; }
    #welcomeScreen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
    #welcomeScreen.hidden { display: none; }
    .badge { display: inline-flex; align-items: center; gap: 8px; padding: 8px 18px; background: rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.3); border-radius: 999px; color: #93c5fd; font-size: 13px; margin-bottom: 20px; }
    .badge-dot { width: 8px; height: 8px; background: #4ade80; border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .welcome-title { color: white; font-size: 32px; font-weight: 600; margin-bottom: 8px; }
    .welcome-subtitle { color: #94a3b8; font-size: 15px; margin-bottom: 32px; }
    .avatar-preview { width: 300px; height: 360px; border-radius: 20px; margin-bottom: 28px; overflow: hidden; box-shadow: 0 30px 60px rgba(0,0,0,0.4); background: linear-gradient(180deg, #fcd34d 0%, #fb923c 30%, #f472b6 60%, #a78bfa 100%); position: relative; }
    #previewCanvas { width: 100%; height: 100%; display: block; }
    .loading-indicator { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); }
    .loading-indicator.hidden { display: none; }
    .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.2); border-top-color: white; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .condition-buttons { display: flex; gap: 14px; margin-bottom: 28px; }
    .condition-btn { padding: 12px 24px; border-radius: 999px; font-size: 14px; font-weight: 600; border: 2px solid transparent; cursor: pointer; transition: all 0.2s; background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.5); }
    .condition-btn:hover { background: rgba(255,255,255,0.15); }
    .condition-btn.positive.active { background: rgba(16,185,129,0.2); border-color: #10b981; color: #34d399; }
    .condition-btn.negative.active { background: rgba(244,63,94,0.2); border-color: #f43f5e; color: #fb7185; }
    .start-btn { padding: 16px 56px; background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; border: none; border-radius: 999px; font-size: 17px; font-weight: 600; cursor: pointer; transition: all 0.2s; box-shadow: 0 12px 30px rgba(59,130,246,0.4); }
    .start-btn:hover:not(:disabled) { transform: translateY(-2px); }
    .start-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .info-text { margin-top: 20px; color: #64748b; font-size: 12px; text-align: center; }
    #statusText { color: #94a3b8; font-size: 13px; margin-top: 12px; }
    #experienceScreen { display: none; flex-direction: column; height: 100vh; height: 100dvh; }
    #experienceScreen.active { display: flex; }
    .header { background: rgba(30,41,59,0.95); backdrop-filter: blur(10px); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.08); flex-shrink: 0; z-index: 100; }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #4ade80; transition: all 0.3s; }
    .status-dot.speaking { background: #60a5fa; box-shadow: 0 0 12px rgba(96,165,250,0.6); animation: pulse 0.8s infinite; }
    .header-name { color: white; font-weight: 600; font-size: 16px; }
    .condition-badge { padding: 6px 14px; border-radius: 999px; font-size: 12px; font-weight: 600; text-transform: uppercase; }
    .condition-badge.positive { background: rgba(16,185,129,0.15); color: #34d399; }
    .condition-badge.negative { background: rgba(244,63,94,0.15); color: #fb7185; }
    .avatar-container { flex: 1; position: relative; background: linear-gradient(180deg, #fcd34d 0%, #fb923c 20%, #f472b6 45%, #c084fc 70%, #60a5fa 100%); overflow: hidden; min-height: 0; }
    #mainCanvas { width: 100%; height: 100%; display: block; }
    .speech-bubble { position: absolute; top: 20px; right: 20px; left: 20px; max-width: 400px; margin-left: auto; background: white; border-radius: 20px; padding: 16px 20px; box-shadow: 0 15px 50px rgba(0,0,0,0.2); opacity: 0; transform: translateY(-15px); transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1); z-index: 100; }
    .speech-bubble.visible { opacity: 1; transform: translateY(0); }
    .speech-bubble p { font-size: 15px; color: #1e293b; line-height: 1.6; }
    .progress-badge { position: absolute; top: 20px; left: 20px; background: #3b82f6; color: white; padding: 10px 20px; border-radius: 999px; font-size: 15px; font-weight: 700; opacity: 0; transition: opacity 0.3s; z-index: 100; }
    .progress-badge.visible { opacity: 1; }
    .task-overlay { position: absolute; bottom: 100px; right: 20px; width: 220px; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 25px 60px rgba(0,0,0,0.3); opacity: 0; transform: translateY(20px); transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1); z-index: 100; }
    .task-overlay.visible { opacity: 1; transform: translateY(0); }
    .task-image { width: 100%; height: 140px; object-fit: cover; }
    .task-input-area { padding: 16px; }
    .task-input { width: 100%; padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 999px; font-size: 14px; margin-bottom: 10px; outline: none; }
    .task-input:focus { border-color: #3b82f6; }
    .task-submit { width: 100%; padding: 12px; background: #3b82f6; color: white; border: none; border-radius: 999px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .task-submit:hover { background: #2563eb; }
    .user-bubble { position: absolute; bottom: 100px; left: 20px; background: #3b82f6; color: white; padding: 12px 18px; border-radius: 18px; border-bottom-left-radius: 4px; opacity: 0; transition: opacity 0.3s; z-index: 100; }
    .user-bubble.visible { opacity: 1; }
    .user-bubble p { font-size: 14px; }
    .input-area { background: rgba(30,41,59,0.95); backdrop-filter: blur(10px); padding: 16px 20px; padding-bottom: max(16px, env(safe-area-inset-bottom)); border-top: 1px solid rgba(255,255,255,0.08); flex-shrink: 0; }
    .action-btn { width: 100%; padding: 16px; background: #3b82f6; color: white; border: none; border-radius: 999px; font-size: 16px; font-weight: 600; cursor: pointer; }
    .action-btn:hover { background: #2563eb; }
    .action-btn.hidden { display: none; }
    .input-row { display: flex; gap: 12px; }
    .input-row.hidden { display: none; }
    .message-input { flex: 1; padding: 16px 20px; background: rgba(71,85,105,0.5); border: none; border-radius: 999px; color: #94a3b8; font-size: 14px; }
    .send-btn { width: 52px; height: 52px; background: rgba(59,130,246,0.4); border: none; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .send-btn svg { width: 22px; height: 22px; fill: white; opacity: 0.6; }
    .completion-text { text-align: center; color: #94a3b8; font-size: 14px; padding: 16px; }
    .completion-text.hidden { display: none; }
  </style>
</head>
<body>

  <div id="welcomeScreen">
    <div class="badge"><span class="badge-dot"></span>3D Embodied Conversational Agent</div>
    <h1 class="welcome-title">Bad News Bot Study</h1>
    <p class="welcome-subtitle">Prototype for Funding Proposal</p>
    <div class="avatar-preview">
      <div id="previewCanvas"></div>
      <div class="loading-indicator" id="loadingIndicator"><div class="spinner"></div><div>Loading 3D Avatar...</div></div>
    </div>
    <div class="condition-buttons">
      <button class="condition-btn positive" id="btnPositive">✓ Positive Anchor</button>
      <button class="condition-btn negative active" id="btnNegative">✗ Negative Anchor</button>
    </div>
    <button class="start-btn" id="startButton" disabled>Loading...</button>
    <p id="statusText"></p>
    <p class="info-text">🎭 3D Avatar + Piper TTS (Jetson)<br>🔊 Built-in English Lip-Sync</p>
  </div>

  <div id="experienceScreen">
    <div class="header">
      <div class="header-left"><span class="status-dot" id="statusDot"></span><span class="header-name">Catherine</span></div>
      <span class="condition-badge negative" id="conditionBadge">Negative</span>
    </div>
    <div class="avatar-container">
      <div id="mainCanvas"></div>
      <div class="speech-bubble" id="speechBubble"><p id="speechText"></p></div>
      <div class="progress-badge" id="progressBadge">95%</div>
      <div class="task-overlay" id="taskOverlay">
        <img class="task-image" id="taskImage" src="" alt="Task">
        <div class="task-input-area">
          <input type="text" class="task-input" id="taskInput" placeholder="e.g. 85%">
          <button class="task-submit" id="taskSubmitBtn">Submit</button>
        </div>
      </div>
      <div class="user-bubble" id="userBubble"><p id="userText"></p></div>
    </div>
    <div class="input-area">
      <button class="action-btn hidden" id="okStartBtn">Ok, start 👍</button>
      <div class="input-row" id="inputRow">
        <input type="text" class="message-input" placeholder="Type your message..." disabled>
        <button class="send-btn" disabled><svg viewBox="0 0 20 20"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"/></svg></button>
      </div>
      <p class="completion-text hidden" id="completionText">Session completed</p>
    </div>
  </div>

  <script type="module">
    import { TalkingHead } from 'talkinghead';
    
    const TTS_API_URL = 'https://754c-134-96-3-2.ngrok-free.app/tts';
    const AVATAR_URL = 'https://cdn.jsdelivr.net/gh/met4citizen/TalkingHead@1.7/avatars/brunette.glb';
    
    const SCRIPT = {
      welcome: [
        "Hello, my name is Catherine, and I will be your moderator guiding today's task.",
        "Here's an important notice. Many participants before have found this task very challenging. In fact, the majority did NOT earn the bonus compensation. Give it your best shot and good luck!",
        "Are you ready to start the task?"
      ],
      tasks: [
        { image: "https://images.unsplash.com/photo-1532996122724-e3c354a0b15b?w=400&h=300&fit=crop", instruction: "Please provide an estimate of the filling level of this garbage can." },
        { image: "https://images.unsplash.com/photo-1605600659908-0ef719419d41?w=400&h=300&fit=crop", instruction: "Alright, next picture. Please provide an estimate of the filling level of this garbage can." }
      ],
      feedback: "Thank you for your response!",
      evaluation: {
        positive: {
          intro: "Excellent, we have finished!",
          result: "Great news! Your picture ratings met the required standard based on our quality checks. You passed a total of 10 out of 10 reference pictures.",
          compensation: "As a result, I'm happy to provide you with a bonus compensation. You will receive the full compensation of 4 pounds!",
          goodbye: "Thanks for participating in this task. Goodbye!"
        },
        negative: {
          intro: "Excellent, we have finished!",
          result: "Unfortunately, your picture ratings did not meet the required standard based on our quality checks. You failed a total of 10 out of 10 reference pictures.",
          compensation: "As a result, I'm unable to provide you with a bonus compensation. You will only receive the baseline compensation of 2 pounds. I'm very sorry about this.",
          goodbye: "Thanks for participating in this task. Goodbye!"
        }
      }
    };
    
    let condition = 'negative';
    let taskIndex = 0;
    let audioContext = null;
    
    window.mainHead = null;
    window.previewHead = null;
    
    const $ = id => document.getElementById(id);
    const delay = ms => new Promise(r => setTimeout(r, ms));
    const setStatus = text => { if ($('statusText')) $('statusText').textContent = text; };
    const setSpeaking = s => $('statusDot')?.classList.toggle('speaking', s);
    
    // ==========================================
    // Generate estimated word timestamps from text
    // ==========================================
    function generateWordTimings(text, audioDurationMs) {
      const words = text.split(/\s+/).filter(w => w.length > 0);
      if (words.length === 0) return { words: [], wtimes: [], wdurations: [] };
      
      // Estimate timing based on word length and audio duration
      const totalChars = words.reduce((sum, w) => sum + w.length, 0);
      const msPerChar = audioDurationMs / totalChars;
      
      const wtimes = [];
      const wdurations = [];
      let currentTime = 0;
      
      for (const word of words) {
        wtimes.push(currentTime);
        const duration = word.length * msPerChar;
        wdurations.push(duration);
        currentTime += duration;
      }
      
      return { words, wtimes, wdurations };
    }
    
    // ==========================================
    // Convert WAV blob to AudioBuffer
    // ==========================================
    async function blobToAudioBuffer(blob) {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      const arrayBuffer = await blob.arrayBuffer();
      return await audioContext.decodeAudioData(arrayBuffer);
    }
    
    // ==========================================
    // TTS with Piper + TalkingHead speakAudio
    // ==========================================
    async function speak(message) {
      $('speechText').textContent = message;
      $('speechBubble').classList.add('visible');
      setSpeaking(true);
      
      console.log('Speaking:', message);
      
      try {
        if (!window.mainHead) {
          throw new Error('Avatar not ready');
        }
        
        // Fetch audio from Piper TTS
        console.log('Fetching TTS...');
        const response = await fetch(TTS_API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: message })
        });
        
        if (!response.ok) throw new Error('TTS API error: ' + response.status);
        
        const audioBlob = await response.blob();
        console.log('Audio blob size:', audioBlob.size);
        
        // Convert to AudioBuffer
        const audioBuffer = await blobToAudioBuffer(audioBlob);
        const audioDurationMs = audioBuffer.duration * 1000;
        console.log('Audio duration:', audioDurationMs, 'ms');
        
        // Generate word timings
        const { words, wtimes, wdurations } = generateWordTimings(message, audioDurationMs);
        console.log('Words:', words.length, 'Timings generated');
        
        // Use TalkingHead's speakAudio with word timings
        // This enables the built-in English lip-sync module
        await new Promise((resolve) => {
          const audioObj = {
            audio: audioBuffer,
            words: words,
            wtimes: wtimes,
            wdurations: wdurations
          };
          
          window.mainHead.speakAudio(audioObj, { lipsyncLang: 'en' });
          
          // Wait for audio to finish
          setTimeout(resolve, audioDurationMs + 300);
        });
        
      } catch (error) {
        console.error('TTS Error:', error);
        // Fallback: just show text
        await delay(message.length * 50);
      }
      
      setSpeaking(false);
    }
    
    // ==========================================
    // AVATAR
    // ==========================================
    async function initAvatar(container, isPreview = false) {
      setStatus(isPreview ? 'Initializing 3D engine...' : '');
      
      const head = new TalkingHead(container, {
        ttsEndpoint: null,
        cameraView: 'upper',
        cameraDistance: isPreview ? 0.6 : 0.55,
        cameraX: 0,
        cameraY: 0,
        lipsyncModules: ['en']  // Load English lip-sync module
      });
      
      if (isPreview) setStatus('Downloading avatar model...');
      
      await head.showAvatar({
        url: AVATAR_URL,
        body: 'F',
        avatarMood: isPreview ? 'happy' : 'neutral',
        lipsyncLang: 'en'
      });
      
      // Idle blink
      setInterval(() => {
        if (head && Math.random() > 0.6) {
          try { head.playGesture('blink'); } catch(e) {}
        }
      }, 3500);
      
      return head;
    }
    
    async function initPreviewAvatar() {
      try {
        window.previewHead = await initAvatar($('previewCanvas'), true);
        $('loadingIndicator').classList.add('hidden');
        $('startButton').disabled = false;
        $('startButton').textContent = 'Start Experience';
        setStatus('✅ Avatar loaded!');
      } catch (error) {
        console.error('Avatar error:', error);
        $('loadingIndicator').innerHTML = `<div style="color:#f87171">⚠️ ${error.message}</div>`;
        setStatus('Error loading avatar');
        $('startButton').disabled = false;
        $('startButton').textContent = 'Start (Fallback)';
      }
    }
    
    // ==========================================
    // FLOW
    // ==========================================
    async function runIntro() {
      console.log('runIntro started');
      for (const msg of SCRIPT.welcome) {
        await speak(msg);
        await delay(800);
      }
      $('okStartBtn').classList.remove('hidden');
      $('inputRow').classList.add('hidden');
    }
    
    async function runTask(idx) {
      if (idx >= SCRIPT.tasks.length) { runEvaluation(); return; }
      taskIndex = idx;
      await speak(SCRIPT.tasks[idx].instruction);
      await delay(400);
      $('taskImage').src = SCRIPT.tasks[idx].image;
      $('taskInput').value = '';
      $('taskOverlay').classList.add('visible');
      setTimeout(() => $('taskInput').focus(), 300);
    }
    
    async function runEvaluation() {
      const script = SCRIPT.evaluation[condition];
      await speak(script.intro);
      await delay(1000);
      await speak(script.result);
      await delay(1200);
      await speak(script.compensation);
      await delay(1200);
      await speak(script.goodbye);
      $('inputRow').classList.add('hidden');
      $('completionText').classList.remove('hidden');
    }
    
    // ==========================================
    // EVENTS
    // ==========================================
    $('btnPositive').onclick = () => {
      condition = 'positive';
      $('btnPositive').classList.add('active');
      $('btnNegative').classList.remove('active');
    };
    
    $('btnNegative').onclick = () => {
      condition = 'negative';
      $('btnNegative').classList.add('active');
      $('btnPositive').classList.remove('active');
    };
    
    $('startButton').onclick = async () => {
      $('conditionBadge').textContent = condition === 'positive' ? 'Positive' : 'Negative';
      $('conditionBadge').className = `condition-badge ${condition}`;
      $('welcomeScreen').classList.add('hidden');
      $('experienceScreen').classList.add('active');
      
      // Resume AudioContext on user interaction
      if (audioContext && audioContext.state === 'suspended') {
        await audioContext.resume();
      }
      
      if (window.previewHead) {
        try {
          console.log('Creating main avatar...');
          window.mainHead = await initAvatar($('mainCanvas'), false);
          console.log('Main avatar created');
        } catch(e) { 
          console.error('Main avatar failed:', e); 
        }
      }
      
      await delay(1000);
      runIntro();
    };
    
    $('okStartBtn').onclick = async () => {
      $('okStartBtn').classList.add('hidden');
      $('inputRow').classList.remove('hidden');
      $('userText').textContent = "Ok! Let's start 👍";
      $('userBubble').classList.add('visible');
      await delay(1000);
      $('userBubble').classList.remove('visible');
      runTask(0);
    };
    
    $('taskSubmitBtn').onclick = async () => {
      const val = $('taskInput').value.trim();
      if (!val) return;
      $('taskOverlay').classList.remove('visible');
      $('userText').textContent = val;
      $('userBubble').classList.add('visible');
      $('progressBadge').classList.add('visible');
      await delay(800);
      $('progressBadge').classList.remove('visible');
      $('userBubble').classList.remove('visible');
      await speak(SCRIPT.feedback);
      await delay(600);
      runTask(taskIndex + 1);
    };
    
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        if (!$('okStartBtn').classList.contains('hidden')) $('okStartBtn').click();
        else if ($('taskOverlay').classList.contains('visible')) $('taskSubmitBtn').click();
      }
    });
    
    initPreviewAvatar();
  </script>
</body>
</html>
