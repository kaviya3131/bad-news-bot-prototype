<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bad News Bot - Embodied Conversational Agent</title>
  
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
      "talkinghead": "https://cdn.jsdelivr.net/gh/met4citizen/TalkingHead@1.7/modules/talkinghead.mjs"
    }
  }
  </script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      background: linear-gradient(145deg, #2d1b4e 0%, #1a1a2e 40%, #0c1929 100%);
      min-height: 100vh; 
      overflow: hidden; 
    }
    
    /* Welcome Screen */
    #welcomeScreen { 
      min-height: 100vh; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
      padding: 24px; 
    }
    #welcomeScreen.hidden { display: none; }
    
    .badge { 
      display: inline-flex; 
      align-items: center; 
      gap: 8px; 
      padding: 10px 20px; 
      background: rgba(139, 92, 246, 0.2); 
      border: 1px solid rgba(139, 92, 246, 0.4); 
      border-radius: 999px; 
      color: #c4b5fd; 
      font-size: 14px; 
      margin-bottom: 24px;
      backdrop-filter: blur(10px);
    }
    .badge-dot { 
      width: 8px; 
      height: 8px; 
      background: #4ade80; 
      border-radius: 50%; 
      animation: pulse 2s infinite; 
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    
    .welcome-title { 
      color: white; 
      font-size: 42px; 
      font-weight: 700; 
      margin-bottom: 12px;
      text-align: center;
      background: linear-gradient(135deg, #fff 0%, #c4b5fd 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .welcome-subtitle { 
      color: #94a3b8; 
      font-size: 16px; 
      margin-bottom: 40px; 
    }
    
    .avatar-preview { 
      width: 320px; 
      height: 400px; 
      border-radius: 24px; 
      margin-bottom: 32px; 
      overflow: hidden; 
      box-shadow: 0 40px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.1); 
      background: linear-gradient(180deg, #fcd34d 0%, #fb923c 25%, #f472b6 50%, #a78bfa 75%, #60a5fa 100%); 
      position: relative; 
    }
    #previewCanvas { width: 100%; height: 100%; display: block; }
    
    .loading-indicator { 
      position: absolute; 
      inset: 0; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
      color: white; 
      background: rgba(0,0,0,0.4); 
      backdrop-filter: blur(8px); 
    }
    .loading-indicator.hidden { display: none; }
    .spinner { 
      width: 48px; 
      height: 48px; 
      border: 3px solid rgba(255,255,255,0.2); 
      border-top-color: white; 
      border-radius: 50%; 
      animation: spin 1s linear infinite; 
      margin-bottom: 16px; 
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .condition-buttons { display: flex; gap: 16px; margin-bottom: 32px; }
    .condition-btn { 
      padding: 14px 28px; 
      border-radius: 999px; 
      font-size: 15px; 
      font-weight: 600; 
      border: 2px solid transparent; 
      cursor: pointer; 
      transition: all 0.3s; 
      background: rgba(255,255,255,0.08); 
      color: rgba(255,255,255,0.5); 
    }
    .condition-btn:hover { background: rgba(255,255,255,0.15); transform: translateY(-2px); }
    .condition-btn.positive.active { background: rgba(16,185,129,0.25); border-color: #10b981; color: #34d399; }
    .condition-btn.negative.active { background: rgba(244,63,94,0.25); border-color: #f43f5e; color: #fb7185; }
    
    .start-btn { 
      padding: 18px 64px; 
      background: linear-gradient(135deg, #8b5cf6, #a78bfa); 
      color: white; 
      border: none; 
      border-radius: 999px; 
      font-size: 18px; 
      font-weight: 600; 
      cursor: pointer; 
      transition: all 0.3s; 
      box-shadow: 0 16px 40px rgba(139, 92, 246, 0.4); 
    }
    .start-btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 20px 50px rgba(139, 92, 246, 0.5); }
    .start-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    
    .info-text { margin-top: 24px; color: #64748b; font-size: 13px; text-align: center; line-height: 1.6; }
    #statusText { color: #94a3b8; font-size: 14px; margin-top: 16px; }
    
    /* Experience Screen */
    #experienceScreen { 
      display: none; 
      height: 100vh; 
      height: 100dvh; 
    }
    #experienceScreen.active { display: flex; }
    
    .main-container {
      display: flex;
      width: 100%;
      height: 100%;
    }
    
    /* Avatar Section - Left Side - BIGGER */
    .avatar-section {
      flex: 0 0 58%;
      position: relative;
      background: linear-gradient(180deg, #fcd34d 0%, #fb923c 15%, #f472b6 35%, #c084fc 55%, #818cf8 75%, #60a5fa 100%);
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    
    #mainCanvas { 
      width: 110%; 
      height: 100%; 
      position: absolute;
      top: 0;
      left: -10%;
    }
    
    .avatar-name-badge {
      position: absolute;
      top: 24px;
      left: 24px;
      background: rgba(255,255,255,0.95);
      padding: 12px 24px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      z-index: 10;
    }
    .avatar-status-dot {
      width: 10px;
      height: 10px;
      background: #4ade80;
      border-radius: 50%;
      transition: all 0.3s;
    }
    .avatar-status-dot.speaking {
      background: #8b5cf6;
      box-shadow: 0 0 12px rgba(139, 92, 246, 0.6);
      animation: pulse 0.8s infinite;
    }
    .avatar-name {
      font-weight: 600;
      font-size: 16px;
      color: #1e293b;
    }
    
    .condition-badge { 
      position: absolute;
      top: 24px;
      right: 24px;
      padding: 8px 18px; 
      border-radius: 999px; 
      font-size: 12px; 
      font-weight: 700; 
      text-transform: uppercase;
      letter-spacing: 0.5px;
      z-index: 10;
    }
    .condition-badge.positive { background: rgba(16,185,129,0.9); color: white; }
    .condition-badge.negative { background: rgba(244,63,94,0.9); color: white; }
    
    /* Chat Section - Right Side - SMALLER */
    .chat-section {
      flex: 0 0 42%;
      display: flex;
      flex-direction: column;
      background: linear-gradient(180deg, #1a1625 0%, #13111a 100%);
      border-left: 1px solid rgba(139, 92, 246, 0.2);
    }
    
    .chat-header {
      padding: 20px 24px;
      border-bottom: 1px solid rgba(139, 92, 246, 0.15);
      background: rgba(26, 22, 37, 0.9);
      backdrop-filter: blur(10px);
    }
    .chat-header h2 {
      color: white;
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .chat-header p {
      color: #8b7fa8;
      font-size: 13px;
    }
    
    /* Chat Messages with Scrollbar */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    /* Custom Scrollbar */
    .chat-messages::-webkit-scrollbar { width: 8px; }
    .chat-messages::-webkit-scrollbar-track { background: rgba(139, 92, 246, 0.05); border-radius: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: rgba(139, 92, 246, 0.3); border-radius: 4px; }
    .chat-messages::-webkit-scrollbar-thumb:hover { background: rgba(139, 92, 246, 0.5); }
    
    .message {
      max-width: 85%;
      padding: 14px 18px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.5;
      animation: messageIn 0.3s ease-out;
    }
    @keyframes messageIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .message.agent {
      align-self: flex-start;
      background: rgba(139, 92, 246, 0.15);
      color: #e2e8f0;
      border-bottom-left-radius: 4px;
      border: 1px solid rgba(139, 92, 246, 0.2);
    }
    .message.user {
      align-self: flex-end;
      background: #8b5cf6;
      color: white;
      border-bottom-right-radius: 4px;
    }
    
    .message.system {
      align-self: center;
      background: rgba(251, 191, 36, 0.15);
      color: #fbbf24;
      font-size: 13px;
      padding: 10px 16px;
      border: 1px solid rgba(251, 191, 36, 0.2);
    }
    
    /* Typing Indicator */
    .typing-indicator {
      display: flex;
      gap: 5px;
      padding: 16px 20px;
      background: rgba(139, 92, 246, 0.15);
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      align-self: flex-start;
      border: 1px solid rgba(139, 92, 246, 0.2);
    }
    .typing-indicator.hidden { display: none; }
    .typing-dot {
      width: 8px;
      height: 8px;
      background: #c4b5fd;
      border-radius: 50%;
      animation: typing 1.4s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
      30% { transform: translateY(-8px); opacity: 1; }
    }
    
    /* Input Area */
    .input-area {
      padding: 20px 24px;
      border-top: 1px solid rgba(139, 92, 246, 0.15);
      background: rgba(19, 17, 26, 0.95);
      backdrop-filter: blur(10px);
    }
    
    .input-row {
      display: flex;
      gap: 10px;
      align-items: center;
      background: rgba(139, 92, 246, 0.08);
      border: 1px solid rgba(139, 92, 246, 0.2);
      border-radius: 16px;
      padding: 6px 6px 6px 20px;
      transition: all 0.2s;
    }
    .input-row:focus-within {
      border-color: rgba(139, 92, 246, 0.5);
      background: rgba(139, 92, 246, 0.12);
    }
    .input-row.recording {
      border-color: rgba(239, 68, 68, 0.5);
      background: rgba(239, 68, 68, 0.08);
    }
    
    .message-input {
      flex: 1;
      padding: 12px 0;
      background: transparent;
      border: none;
      color: white;
      font-size: 15px;
      outline: none;
    }
    .message-input::placeholder { color: #8b7fa8; }
    
    /* Recording indicator inline */
    .recording-badge {
      display: none;
      align-items: center;
      gap: 8px;
      color: #ef4444;
      font-size: 14px;
      font-weight: 500;
      padding-right: 12px;
    }
    .recording-badge.active { display: flex; }
    .recording-badge .dot {
      width: 10px;
      height: 10px;
      background: #ef4444;
      border-radius: 50%;
      animation: blink 1s infinite;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    
    /* Voice Button */
    .voice-btn {
      width: 44px;
      height: 44px;
      background: transparent;
      border: none;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      color: #8b7fa8;
    }
    .voice-btn:hover {
      background: rgba(139, 92, 246, 0.2);
      color: white;
    }
    .voice-btn.recording {
      background: #ef4444;
      color: white;
      animation: recordPulse 1.5s infinite;
    }
    @keyframes recordPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }
    .voice-btn svg {
      width: 22px;
      height: 22px;
      fill: currentColor;
    }
    
    .send-btn {
      width: 44px;
      height: 44px;
      background: #8b5cf6;
      border: none;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .send-btn:hover { background: #7c3aed; }
    .send-btn svg {
      width: 20px;
      height: 20px;
      fill: white;
    }
    
    .action-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #8b5cf6, #a78bfa);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .action-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(139, 92, 246, 0.4); }
    .action-btn.hidden { display: none; }
    
    /* Speech recognition status */
    .speech-status {
      font-size: 12px;
      color: #8b7fa8;
      text-align: center;
      padding: 8px;
      display: none;
    }
    .speech-status.active {
      display: block;
      color: #ef4444;
    }
  </style>
</head>
<body>

  <!-- Welcome Screen -->
  <div id="welcomeScreen">
    <div class="badge"><span class="badge-dot"></span>Embodied Conversational Agent</div>
    <h1 class="welcome-title">Bad News Bot Study</h1>
    <p class="welcome-subtitle">Research Prototype — Universität des Saarlandes</p>
    <div class="avatar-preview">
      <div id="previewCanvas"></div>
      <div class="loading-indicator" id="loadingIndicator">
        <div class="spinner"></div>
        <div>Loading 3D Avatar...</div>
      </div>
    </div>
    <div class="condition-buttons">
      <button class="condition-btn positive" id="btnPositive">✓ Positive Feedback</button>
      <button class="condition-btn negative active" id="btnNegative">✗ Negative Feedback</button>
    </div>
    <button class="start-btn" id="startButton" disabled>Loading...</button>
    <p id="statusText"></p>
    <p class="info-text">🎭 3D Avatar with Lip-Sync<br>🎤 Voice Input (Speech Recognition)</p>
  </div>

  <!-- Experience Screen -->
  <div id="experienceScreen">
    <div class="main-container">
      <!-- Avatar Section - BIGGER -->
      <div class="avatar-section">
        <div id="mainCanvas"></div>
        <div class="avatar-name-badge">
          <span class="avatar-status-dot" id="statusDot"></span>
          <span class="avatar-name">Catherine</span>
        </div>
        <span class="condition-badge negative" id="conditionBadge">Negative</span>
      </div>
      
      <!-- Chat Section -->
      <div class="chat-section">
        <div class="chat-header">
          <h2>💬 Conversation</h2>
          <p>Prolific Study Evaluation</p>
        </div>
        
        <div class="chat-messages" id="chatMessages">
          <div class="typing-indicator hidden" id="typingIndicator">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
          </div>
        </div>
        
        <div class="input-area">
          <button class="action-btn hidden" id="okStartBtn">I'm ready to begin! 🚀</button>
          <div class="input-row" id="inputRow">
            <div class="recording-badge" id="recordingBadge">
              <span class="dot"></span>
              <span>Listening...</span>
            </div>
            <input type="text" class="message-input" id="messageInput" placeholder="Type or click 🎤 to speak...">
            <button class="voice-btn" id="voiceBtn" title="Click to speak">
              <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V20c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z"/></svg>
            </button>
            <button class="send-btn" id="sendBtn" title="Send">
              <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { TalkingHead } from 'talkinghead';
    
    // ⚠️ UPDATE THIS URL when ngrok restarts!
    const TTS_API_URL = 'https://4129-134-96-3-2.ngrok-free.app/tts';
    const AVATAR_URL = 'https://cdn.jsdelivr.net/gh/met4citizen/TalkingHead@1.7/avatars/brunette.glb';
    
    // Better scenario for demo - Prolific-style crowdsourcing study
    const SCRIPT = {
      welcome: [
        "Hi there! I'm Catherine, your study moderator for today.",
        "Thank you for participating in this Prolific study. You'll be completing a short attention and accuracy task.",
        "If you pass all quality checks, you'll receive a £3 bonus on top of your base payment.",
        "Are you ready to start?"
      ],
      tasks: [
        { 
          question: "First question: In which year did World War II end?",
          followup: "Thanks for your answer."
        },
        { 
          question: "Next: What is the capital city of Australia?",
          followup: "Got it."
        },
        { 
          question: "Last one: How many continents are there on Earth?",
          followup: "Noted, thank you."
        }
      ],
      evaluation: {
        positive: {
          intro: "Alright, I've reviewed your responses.",
          result: "Great news! You passed all 3 quality checks with flying colors.",
          compensation: "You've earned the full £3 bonus payment. Well done!",
          goodbye: "Your payment will be processed within 24 hours. Thanks for participating, and have a wonderful day!"
        },
        negative: {
          intro: "Alright, I've reviewed your responses.",
          result: "Unfortunately, your answers didn't meet our accuracy threshold. You failed 2 out of 3 quality checks.",
          compensation: "I'm sorry, but you won't be receiving the bonus payment. You'll only get the base rate of £0.50.",
          goodbye: "Better luck next time. Thanks for your participation."
        }
      }
    };
    
    let condition = 'negative';
    let taskIndex = 0;
    let audioContext = null;
    
    // Speech Recognition
    let recognition = null;
    let isListening = false;
    
    window.mainHead = null;
    window.previewHead = null;
    
    const $ = id => document.getElementById(id);
    const delay = ms => new Promise(r => setTimeout(r, ms));
    const setStatus = text => { if ($('statusText')) $('statusText').textContent = text; };
    const setSpeaking = s => $('statusDot')?.classList.toggle('speaking', s);
    
    // ==========================================
    // Speech Recognition Setup (Web Speech API)
    // ==========================================
    function initSpeechRecognition() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      
      if (!SpeechRecognition) {
        console.warn('Speech Recognition not supported');
        return null;
      }
      
      recognition = new SpeechRecognition();
      recognition.continuous = false;
      recognition.interimResults = true;
      recognition.lang = 'en-US';
      
      recognition.onstart = () => {
        isListening = true;
        $('voiceBtn').classList.add('recording');
        $('inputRow').classList.add('recording');
        $('recordingBadge').classList.add('active');
        $('messageInput').placeholder = 'Listening...';
      };
      
      recognition.onresult = (event) => {
        let finalTranscript = '';
        let interimTranscript = '';
        
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const transcript = event.results[i][0].transcript;
          if (event.results[i].isFinal) {
            finalTranscript += transcript;
          } else {
            interimTranscript += transcript;
          }
        }
        
        // Show what's being recognized in real-time
        $('messageInput').value = finalTranscript || interimTranscript;
      };
      
      recognition.onend = () => {
        isListening = false;
        $('voiceBtn').classList.remove('recording');
        $('inputRow').classList.remove('recording');
        $('recordingBadge').classList.remove('active');
        $('messageInput').placeholder = 'Type or click 🎤 to speak...';
        $('messageInput').focus();
      };
      
      recognition.onerror = (event) => {
        console.error('Speech recognition error:', event.error);
        isListening = false;
        $('voiceBtn').classList.remove('recording');
        $('inputRow').classList.remove('recording');
        $('recordingBadge').classList.remove('active');
        $('messageInput').placeholder = 'Type or click 🎤 to speak...';
        
        if (event.error === 'not-allowed') {
          alert('Microphone access denied. Please allow microphone access and try again.');
        }
      };
      
      return recognition;
    }
    
    function toggleSpeechRecognition() {
      if (!recognition) {
        recognition = initSpeechRecognition();
        if (!recognition) {
          alert('Speech recognition is not supported in this browser. Please use Chrome.');
          return;
        }
      }
      
      if (isListening) {
        recognition.stop();
      } else {
        $('messageInput').value = '';
        recognition.start();
      }
    }
    
    // ==========================================
    // Chat Messages
    // ==========================================
    function addMessage(text, type = 'agent') {
      const chatMessages = $('chatMessages');
      const typingIndicator = $('typingIndicator');
      
      const msg = document.createElement('div');
      msg.className = `message ${type}`;
      msg.textContent = text;
      
      chatMessages.insertBefore(msg, typingIndicator);
      chatMessages.scrollTop = chatMessages.scrollHeight;
      return msg;
    }
    
    function showTyping(show) {
      $('typingIndicator').classList.toggle('hidden', !show);
      if (show) $('chatMessages').scrollTop = $('chatMessages').scrollHeight;
    }
    
    // ==========================================
    // Better Word Timing for Lip Sync
    // ==========================================
    function generateWordTimings(text, audioDurationMs) {
      const words = text.split(/\s+/).filter(w => w.length > 0);
      if (words.length === 0) return { words: [], wtimes: [], wdurations: [] };
      
      const syllableCounts = words.map(word => {
        const vowels = word.toLowerCase().match(/[aeiouy]+/g);
        return vowels ? Math.max(1, vowels.length) : 1;
      });
      
      const totalSyllables = syllableCounts.reduce((a, b) => a + b, 0);
      const msPerSyllable = (audioDurationMs * 0.85) / totalSyllables;
      
      const wtimes = [];
      const wdurations = [];
      let currentTime = audioDurationMs * 0.08;
      
      for (let i = 0; i < words.length; i++) {
        wtimes.push(currentTime);
        const duration = syllableCounts[i] * msPerSyllable;
        wdurations.push(duration * 0.9);
        currentTime += duration;
      }
      
      return { words, wtimes, wdurations };
    }
    
    async function blobToAudioBuffer(blob) {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioContext.state === 'suspended') await audioContext.resume();
      const arrayBuffer = await blob.arrayBuffer();
      return await audioContext.decodeAudioData(arrayBuffer);
    }
    
    // ==========================================
    // TTS + Lip Sync
    // ==========================================
    async function speak(message) {
      addMessage(message, 'agent');
      setSpeaking(true);
      showTyping(false);
      
      try {
        if (!window.mainHead) throw new Error('Avatar not ready');
        
        const response = await fetch(TTS_API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: message })
        });
        
        if (!response.ok) throw new Error('TTS error: ' + response.status);
        
        const audioBlob = await response.blob();
        const audioBuffer = await blobToAudioBuffer(audioBlob);
        const audioDurationMs = audioBuffer.duration * 1000;
        
        const { words, wtimes, wdurations } = generateWordTimings(message, audioDurationMs);
        
        await new Promise((resolve) => {
          window.mainHead.speakAudio({
            audio: audioBuffer,
            words: words,
            wtimes: wtimes,
            wdurations: wdurations
          }, { lipsyncLang: 'en' });
          
          setTimeout(resolve, audioDurationMs + 200);
        });
        
      } catch (error) {
        console.error('TTS Error:', error);
        await delay(message.length * 40);
      }
      
      setSpeaking(false);
    }
    
    // ==========================================
    // Avatar
    // ==========================================
    async function initAvatar(container, isPreview = false) {
      setStatus(isPreview ? 'Initializing...' : '');
      
      const head = new TalkingHead(container, {
        ttsEndpoint: null,
        cameraView: 'upper',
        cameraDistance: isPreview ? 0.6 : 0.3, // Even closer for bigger avatar
        cameraX: -0.05, // Slight left offset
        cameraY: 0.08,
        lipsyncModules: ['en']
      });
      
      if (isPreview) setStatus('Loading avatar...');
      
      await head.showAvatar({
        url: AVATAR_URL,
        body: 'F',
        avatarMood: isPreview ? 'happy' : 'neutral',
        lipsyncLang: 'en'
      });
      
      setInterval(() => {
        if (head && Math.random() > 0.5) {
          try { head.playGesture('blink'); } catch(e) {}
        }
      }, 3000);
      
      return head;
    }
    
    async function initPreviewAvatar() {
      try {
        window.previewHead = await initAvatar($('previewCanvas'), true);
        $('loadingIndicator').classList.add('hidden');
        $('startButton').disabled = false;
        $('startButton').textContent = 'Start Experience';
        setStatus('✅ Ready');
        
        // Init speech recognition
        initSpeechRecognition();
      } catch (error) {
        console.error('Avatar error:', error);
        $('loadingIndicator').innerHTML = `<div style="color:#f87171">⚠️ ${error.message}</div>`;
        $('startButton').disabled = false;
        $('startButton').textContent = 'Start Anyway';
      }
    }
    
    // ==========================================
    // Flow
    // ==========================================
    async function runIntro() {
      for (const msg of SCRIPT.welcome) {
        showTyping(true);
        await delay(600);
        showTyping(false);
        await speak(msg);
        await delay(400);
      }
      $('okStartBtn').classList.remove('hidden');
      $('inputRow').style.display = 'none';
    }
    
    async function runTask(idx) {
      if (idx >= SCRIPT.tasks.length) { 
        runEvaluation(); 
        return; 
      }
      taskIndex = idx;
      
      showTyping(true);
      await delay(500);
      showTyping(false);
      
      await speak(SCRIPT.tasks[idx].question);
      
      // Enable input for user to answer
      $('inputRow').style.display = 'flex';
      $('messageInput').focus();
    }
    
    async function handleUserResponse(text) {
      if (!text.trim()) return;
      
      $('messageInput').value = '';
      addMessage(text, 'user');
      $('inputRow').style.display = 'none';
      
      showTyping(true);
      await delay(600);
      showTyping(false);
      
      await speak(SCRIPT.tasks[taskIndex].followup);
      await delay(400);
      
      runTask(taskIndex + 1);
    }
    
    async function runEvaluation() {
      const script = SCRIPT.evaluation[condition];
      $('inputRow').style.display = 'none';
      
      for (const key of ['intro', 'result', 'compensation', 'goodbye']) {
        showTyping(true);
        await delay(500);
        showTyping(false);
        await speak(script[key]);
        await delay(600);
      }
      
      addMessage("✨ Study complete. Thank you!", 'system');
    }
    
    // ==========================================
    // Events
    // ==========================================
    $('btnPositive').onclick = () => {
      condition = 'positive';
      $('btnPositive').classList.add('active');
      $('btnNegative').classList.remove('active');
    };
    
    $('btnNegative').onclick = () => {
      condition = 'negative';
      $('btnNegative').classList.add('active');
      $('btnPositive').classList.remove('active');
    };
    
    $('startButton').onclick = async () => {
      // Resume audio context on user interaction
      if (audioContext && audioContext.state === 'suspended') {
        await audioContext.resume();
      }
      
      $('conditionBadge').textContent = condition === 'positive' ? 'Positive' : 'Negative';
      $('conditionBadge').className = `condition-badge ${condition}`;
      $('welcomeScreen').classList.add('hidden');
      $('experienceScreen').classList.add('active');
      
      if (window.previewHead) {
        try {
          window.mainHead = await initAvatar($('mainCanvas'), false);
        } catch(e) { 
          console.error('Avatar failed:', e); 
        }
      }
      
      await delay(600);
      runIntro();
    };
    
    $('okStartBtn').onclick = async () => {
      $('okStartBtn').classList.add('hidden');
      addMessage("Yes, I'm ready!", 'user');
      await delay(400);
      runTask(0);
    };
    
    $('voiceBtn').onclick = () => {
      toggleSpeechRecognition();
    };
    
    $('sendBtn').onclick = () => {
      const text = $('messageInput').value.trim();
      if (text) {
        handleUserResponse(text);
      }
    };
    
    $('messageInput').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        const text = $('messageInput').value.trim();
        if (text) {
          handleUserResponse(text);
        }
      }
    });
    
    initPreviewAvatar();
  </script>
</body>
</html>
