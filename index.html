<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Embodied CA - Bad News Bot Study</title>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e293b;
      min-height: 100vh;
      overflow: hidden;
    }
    
    /* ==================== WELCOME SCREEN ==================== */
    #welcomeScreen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
    }
    
    #welcomeScreen.hidden { display: none; }
    
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 18px;
      background: rgba(59,130,246,0.15);
      border: 1px solid rgba(59,130,246,0.3);
      border-radius: 999px;
      color: #93c5fd;
      font-size: 13px;
      margin-bottom: 20px;
    }
    
    .badge-dot {
      width: 8px;
      height: 8px;
      background: #4ade80;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.9); }
    }
    
    .welcome-title {
      color: white;
      font-size: 32px;
      font-weight: 600;
      margin-bottom: 8px;
      text-align: center;
    }
    
    .welcome-subtitle {
      color: #94a3b8;
      font-size: 15px;
      margin-bottom: 36px;
    }
    
    .avatar-preview {
      width: 300px;
      height: 340px;
      border-radius: 20px;
      margin-bottom: 28px;
      overflow: hidden;
      box-shadow: 0 30px 60px -15px rgba(0,0,0,0.5);
      background: linear-gradient(180deg, #fcd34d 0%, #fb923c 30%, #f472b6 60%, #a78bfa 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 14px;
      text-align: center;
      padding: 20px;
    }
    
    .condition-buttons {
      display: flex;
      gap: 14px;
      margin-bottom: 28px;
    }
    
    .condition-btn {
      padding: 12px 24px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.25s ease;
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.5);
    }
    
    .condition-btn:hover {
      background: rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.8);
    }
    
    .condition-btn.positive.active {
      background: rgba(16,185,129,0.2);
      border-color: #10b981;
      color: #34d399;
    }
    
    .condition-btn.negative.active {
      background: rgba(244,63,94,0.2);
      border-color: #f43f5e;
      color: #fb7185;
    }
    
    .start-btn {
      padding: 16px 56px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      border: none;
      border-radius: 999px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 12px 30px -8px rgba(59,130,246,0.5);
    }
    
    .start-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 40px -8px rgba(59,130,246,0.6);
    }
    
    .info-text {
      margin-top: 20px;
      color: #64748b;
      font-size: 12px;
      text-align: center;
      max-width: 280px;
    }
    
    /* ==================== EXPERIENCE SCREEN ==================== */
    #experienceScreen {
      display: none;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
    }
    
    #experienceScreen.active { display: flex; }
    
    .header {
      background: linear-gradient(180deg, rgba(30,41,59,0.98), rgba(30,41,59,0.95));
      backdrop-filter: blur(10px);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
      z-index: 100;
    }
    
    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 8px rgba(74,222,128,0.5);
      transition: all 0.3s;
    }
    
    .status-dot.speaking {
      background: #60a5fa;
      box-shadow: 0 0 12px rgba(96,165,250,0.6);
      animation: pulse 0.8s infinite;
    }
    
    .header-name {
      color: white;
      font-weight: 600;
      font-size: 16px;
    }
    
    .condition-badge {
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .condition-badge.positive {
      background: rgba(16,185,129,0.15);
      color: #34d399;
      border: 1px solid rgba(16,185,129,0.3);
    }
    
    .condition-badge.negative {
      background: rgba(244,63,94,0.15);
      color: #fb7185;
      border: 1px solid rgba(244,63,94,0.3);
    }
    
    /* ==================== AVATAR CONTAINER ==================== */
    .avatar-container {
      flex: 1;
      position: relative;
      background: linear-gradient(180deg, 
        #fcd34d 0%, 
        #fb923c 20%, 
        #f472b6 45%, 
        #c084fc 70%,
        #60a5fa 100%
      );
      overflow: hidden;
      min-height: 0;
    }
    
    #avatarCanvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    
    /* Loading overlay */
    .loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(15,23,42,0.92);
      backdrop-filter: blur(8px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
      transition: opacity 0.5s;
    }
    
    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(59,130,246,0.2);
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .loading-text {
      color: white;
      font-size: 15px;
      font-weight: 500;
    }
    
    .loading-subtext {
      color: #64748b;
      font-size: 12px;
      margin-top: 8px;
    }
    
    /* ==================== SPEECH BUBBLE ==================== */
    .speech-bubble {
      position: absolute;
      top: 20px;
      right: 20px;
      left: 20px;
      max-width: 380px;
      margin-left: auto;
      background: white;
      border-radius: 20px;
      padding: 16px 20px;
      box-shadow: 0 15px 50px rgba(0,0,0,0.2);
      opacity: 0;
      transform: translateY(-15px) scale(0.95);
      transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 100;
    }
    
    .speech-bubble.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
    
    .speech-bubble p {
      font-size: 15px;
      color: #1e293b;
      line-height: 1.65;
    }
    
    /* ==================== PROGRESS BADGE ==================== */
    .progress-badge {
      position: absolute;
      top: 20px;
      left: 20px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      padding: 10px 20px;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 700;
      box-shadow: 0 8px 25px rgba(59,130,246,0.4);
      opacity: 0;
      transform: scale(0.8);
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 100;
    }
    
    .progress-badge.visible { 
      opacity: 1; 
      transform: scale(1);
    }
    
    /* ==================== TASK OVERLAY ==================== */
    .task-overlay {
      position: absolute;
      bottom: 110px;
      right: 20px;
      width: 220px;
      background: white;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 25px 60px rgba(0,0,0,0.3);
      opacity: 0;
      transform: translateY(30px) scale(0.9);
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 100;
    }
    
    .task-overlay.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
    
    .task-image {
      width: 100%;
      height: 140px;
      object-fit: cover;
      display: block;
    }
    
    .task-input-area {
      padding: 16px;
    }
    
    .task-input {
      width: 100%;
      padding: 14px 18px;
      border: 2px solid #e2e8f0;
      border-radius: 999px;
      font-size: 15px;
      margin-bottom: 12px;
      outline: none;
      transition: all 0.2s;
    }
    
    .task-input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 4px rgba(59,130,246,0.15);
    }
    
    .task-submit {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      border: none;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .task-submit:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(59,130,246,0.35);
    }
    
    /* ==================== USER BUBBLE ==================== */
    .user-bubble {
      position: absolute;
      bottom: 110px;
      left: 20px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      padding: 14px 20px;
      border-radius: 20px;
      border-bottom-left-radius: 6px;
      box-shadow: 0 8px 30px rgba(59,130,246,0.4);
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s;
      z-index: 100;
    }
    
    .user-bubble.visible { 
      opacity: 1; 
      transform: translateY(0);
    }
    
    .user-bubble p { font-size: 15px; }
    
    /* ==================== BOTTOM INPUT ==================== */
    .input-area {
      background: linear-gradient(180deg, rgba(30,41,59,0.95), rgba(30,41,59,0.98));
      backdrop-filter: blur(10px);
      padding: 18px 20px;
      padding-bottom: max(18px, env(safe-area-inset-bottom));
      border-top: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    
    .action-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      border: none;
      border-radius: 999px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
      box-shadow: 0 8px 30px rgba(59,130,246,0.35);
    }
    
    .action-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 35px rgba(59,130,246,0.45);
    }
    
    .action-btn.hidden { display: none; }
    
    .input-row {
      display: flex;
      gap: 14px;
    }
    
    .input-row.hidden { display: none; }
    
    .message-input {
      flex: 1;
      padding: 18px 24px;
      background: rgba(71,85,105,0.5);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 999px;
      color: #94a3b8;
      font-size: 15px;
    }
    
    .send-btn {
      width: 56px;
      height: 56px;
      background: rgba(59,130,246,0.4);
      border: none;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: not-allowed;
    }
    
    .send-btn svg {
      width: 24px;
      height: 24px;
      fill: white;
      opacity: 0.6;
    }
    
    .completion-text {
      text-align: center;
      color: #94a3b8;
      font-size: 15px;
      padding: 18px;
    }
    
    .completion-text.hidden { display: none; }
  </style>
</head>
<body>

  <!-- ==================== WELCOME SCREEN ==================== -->
  <div id="welcomeScreen">
    <div class="badge">
      <span class="badge-dot"></span>
      3D Embodied Conversational Agent
    </div>
    <h1 class="welcome-title">Bad News Bot Study</h1>
    <p class="welcome-subtitle">Prototype for Funding Proposal</p>
    
    <div class="avatar-preview">
      <div>
        <div style="font-size: 48px; margin-bottom: 12px;">👩‍💼</div>
        <div style="font-weight: 600; margin-bottom: 6px;">Catherine</div>
        <div style="font-size: 12px; opacity: 0.8;">3D Avatar will load when you start</div>
      </div>
    </div>
    
    <div class="condition-buttons">
      <button class="condition-btn positive" id="btnPositive">
        ✓ Positive Anchor
      </button>
      <button class="condition-btn negative active" id="btnNegative">
        ✗ Negative Anchor
      </button>
    </div>
    
    <button class="start-btn" id="startButton">
      Start Experience
    </button>
    
    <p class="info-text">
      🔊 Uses browser's built-in voice synthesis<br>
      🎭 3D Avatar powered by TalkingHead
    </p>
  </div>

  <!-- ==================== EXPERIENCE SCREEN ==================== -->
  <div id="experienceScreen">
    <div class="header">
      <div class="header-left">
        <span class="status-dot" id="statusDot"></span>
        <span class="header-name">Catherine</span>
      </div>
      <span class="condition-badge negative" id="conditionBadge">Negative</span>
    </div>
    
    <div class="avatar-container">
      <!-- TalkingHead renders here -->
      <div id="avatarCanvas"></div>
      
      <!-- Loading Overlay -->
      <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading Catherine...</div>
        <div class="loading-subtext" id="loadingSubtext">Preparing 3D avatar</div>
      </div>
      
      <!-- Speech Bubble -->
      <div class="speech-bubble" id="speechBubble">
        <p id="speechText"></p>
      </div>
      
      <!-- Progress Badge -->
      <div class="progress-badge" id="progressBadge">95%</div>
      
      <!-- Task Overlay -->
      <div class="task-overlay" id="taskOverlay">
        <img class="task-image" id="taskImage" src="" alt="Task">
        <div class="task-input-area">
          <input type="text" class="task-input" id="taskInput" placeholder="e.g. 85%">
          <button class="task-submit" id="taskSubmitBtn">Submit</button>
        </div>
      </div>
      
      <!-- User Bubble -->
      <div class="user-bubble" id="userBubble">
        <p id="userText"></p>
      </div>
    </div>
    
    <div class="input-area">
      <button class="action-btn hidden" id="startBtn">
        Ok, start 👍
      </button>
      <div class="input-row" id="inputRow">
        <input type="text" class="message-input" placeholder="Type your message..." disabled>
        <button class="send-btn" disabled>
          <svg viewBox="0 0 20 20">
            <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"/>
          </svg>
        </button>
      </div>
      <p class="completion-text hidden" id="completionText">Session completed</p>
    </div>
  </div>

  <!-- Load TalkingHead as module -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js/+esm",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/",
      "talkinghead": "https://cdn.jsdelivr.net/gh/met4citizen/TalkingHead@1.2/modules/talkinghead.mjs"
    }
  }
  </script>

  <script type="module">
    import { TalkingHead } from 'talkinghead';
    
    // Expose TalkingHead to window for the main script
    window.TalkingHead = TalkingHead;
    window.talkingHeadLoaded = true;
    
    // Dispatch event when ready
    window.dispatchEvent(new Event('talkinghead-ready'));
  </script>

  <script>
    // ==========================================
    // CONFIGURATION
    // ==========================================
    const AVATAR_URL = 'https://models.readyplayer.me/64bfa15f0e72c63d7c3934a6.glb?morphTargets=ARKit,Oculus+Visemes,mouthOpen,mouthSmile,eyesClosed,eyesLookUp,eyesLookDown&textureSizeLimit=1024&textureFormat=png';
    
    // ==========================================
    // SCRIPT DATA
    // ==========================================
    const SCRIPT = {
      welcome: [
        "Hello, my name is Catherine, and I will be your moderator guiding today's task.",
        "Here's an important notice. Many participants before have found this task very challenging. In fact, the majority did NOT earn the bonus compensation. Give it your best shot and good luck!",
        "Are you ready to start the task?"
      ],
      tasks: [
        { 
          image: "https://images.unsplash.com/photo-1532996122724-e3c354a0b15b?w=400&h=300&fit=crop",
          instruction: "Please provide an estimate of the filling level of this garbage can." 
        },
        { 
          image: "https://images.unsplash.com/photo-1605600659908-0ef719419d41?w=400&h=300&fit=crop",
          instruction: "Alright, next picture. Please provide an estimate of the filling level of this garbage can." 
        }
      ],
      feedback: "Thank you for your response!",
      evaluation: {
        positive: {
          intro: "Excellent, we have finished!",
          result: "Great news! Your picture ratings met the required standard based on our quality checks. You passed a total of 10 out of 10 reference pictures.",
          compensation: "As a result, I'm happy to provide you with a bonus compensation. You will receive the full compensation of 4 pounds!",
          goodbye: "Thanks for participating in this task. Goodbye!"
        },
        negative: {
          intro: "Excellent, we have finished!",
          result: "Unfortunately, your picture ratings did not meet the required standard based on our quality checks. You failed a total of 10 out of 10 reference pictures.",
          compensation: "As a result, I'm unable to provide you with a bonus compensation. You will only receive the baseline compensation of 2 pounds. I'm very sorry about this.",
          goodbye: "Thanks for participating in this task. Goodbye!"
        }
      }
    };
    
    // ==========================================
    // STATE
    // ==========================================
    let condition = 'negative';
    let taskIndex = 0;
    let head = null;
    let synth = window.speechSynthesis;
    let selectedVoice = null;
    
    // ==========================================
    // DOM ELEMENTS
    // ==========================================
    const welcomeScreen = document.getElementById('welcomeScreen');
    const experienceScreen = document.getElementById('experienceScreen');
    const statusDot = document.getElementById('statusDot');
    const conditionBadge = document.getElementById('conditionBadge');
    const speechBubble = document.getElementById('speechBubble');
    const speechText = document.getElementById('speechText');
    const progressBadge = document.getElementById('progressBadge');
    const taskOverlay = document.getElementById('taskOverlay');
    const taskImage = document.getElementById('taskImage');
    const taskInput = document.getElementById('taskInput');
    const userBubble = document.getElementById('userBubble');
    const userText = document.getElementById('userText');
    const startBtn = document.getElementById('startBtn');
    const inputRow = document.getElementById('inputRow');
    const completionText = document.getElementById('completionText');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const loadingSubtext = document.getElementById('loadingSubtext');
    
    // ==========================================
    // VOICE SETUP
    // ==========================================
    function loadVoices() {
      const voices = synth.getVoices();
      selectedVoice = voices.find(v => v.name.includes('Female') && v.lang.startsWith('en')) ||
                      voices.find(v => v.name.includes('Samantha')) ||
                      voices.find(v => v.name.includes('Victoria')) ||
                      voices.find(v => v.name.includes('Karen')) ||
                      voices.find(v => v.lang.startsWith('en-GB')) ||
                      voices.find(v => v.lang.startsWith('en')) ||
                      voices[0];
      console.log('Selected voice:', selectedVoice?.name);
    }
    
    if (synth.onvoiceschanged !== undefined) {
      synth.onvoiceschanged = loadVoices;
    }
    loadVoices();
    
    // ==========================================
    // HELPER FUNCTIONS
    // ==========================================
    const delay = ms => new Promise(resolve => setTimeout(resolve, ms));
    
    function setSpeaking(isSpeaking) {
      statusDot.classList.toggle('speaking', isSpeaking);
    }
    
    async function speak(message) {
      return new Promise(async (resolve) => {
        speechText.textContent = message;
        speechBubble.classList.add('visible');
        synth.cancel();
        setSpeaking(true);
        
        // Try TalkingHead first
        if (head) {
          try {
            await head.speakText(message, { lang: 'en', rate: 0.95, pitch: 1.1 });
            setSpeaking(false);
            resolve();
            return;
          } catch (e) {
            console.log('TalkingHead TTS failed, using browser fallback');
          }
        }
        
        // Browser Web Speech API fallback
        const utterance = new SpeechSynthesisUtterance(message);
        utterance.voice = selectedVoice;
        utterance.rate = 0.95;
        utterance.pitch = 1.1;
        
        utterance.onend = () => {
          setSpeaking(false);
          resolve();
        };
        
        utterance.onerror = () => {
          setSpeaking(false);
          resolve();
        };
        
        synth.speak(utterance);
        
        // Fallback timeout
        setTimeout(() => {
          if (!synth.speaking) {
            setSpeaking(false);
            resolve();
          }
        }, Math.max(3000, message.length * 80));
      });
    }
    
    function showUserMessage(message) {
      userText.textContent = message;
      userBubble.classList.add('visible');
    }
    
    function hideUserMessage() {
      userBubble.classList.remove('visible');
    }
    
    function showProgress() {
      progressBadge.classList.add('visible');
    }
    
    function hideProgress() {
      progressBadge.classList.remove('visible');
    }
    
    function showTask(index) {
      taskImage.src = SCRIPT.tasks[index].image;
      taskInput.value = '';
      taskOverlay.classList.add('visible');
      setTimeout(() => taskInput.focus(), 400);
    }
    
    function hideTask() {
      taskOverlay.classList.remove('visible');
    }
    
    // ==========================================
    // AVATAR INITIALIZATION
    // ==========================================
    async function initAvatar() {
      // Wait for TalkingHead module to load
      if (!window.talkingHeadLoaded) {
        await new Promise(resolve => {
          window.addEventListener('talkinghead-ready', resolve, { once: true });
          // Timeout fallback
          setTimeout(resolve, 5000);
        });
      }
      
      if (!window.TalkingHead) {
        console.log('TalkingHead not available, using voice-only mode');
        loadingSubtext.textContent = 'Using voice-only mode';
        setTimeout(() => loadingOverlay.classList.add('hidden'), 1500);
        return false;
      }
      
      try {
        console.log('Initializing TalkingHead...');
        
        head = new window.TalkingHead(document.getElementById('avatarCanvas'), {
          ttsLang: 'en-GB',
          cameraView: 'upper',
          cameraDistance: 0.6
        });
        
        console.log('Loading avatar...');
        await head.showAvatar({
          url: AVATAR_URL,
          body: 'F',
          avatarMood: 'neutral',
          lipsyncLang: 'en'
        }, (ev) => {
          if (ev.lengthComputable) {
            const pct = Math.round((ev.loaded / ev.total) * 100);
            loadingSubtext.textContent = `Loading: ${pct}%`;
          }
        });
        
        console.log('Avatar loaded!');
        head.setMood('neutral');
        loadingOverlay.classList.add('hidden');
        return true;
      } catch (error) {
        console.error('Failed to load avatar:', error);
        loadingSubtext.textContent = 'Avatar unavailable - voice only';
        setTimeout(() => loadingOverlay.classList.add('hidden'), 2000);
        return false;
      }
    }
    
    // ==========================================
    // EXPERIMENT FLOW
    // ==========================================
    async function runIntro() {
      for (const message of SCRIPT.welcome) {
        await speak(message);
        await delay(800);
      }
      
      startBtn.classList.remove('hidden');
      inputRow.classList.add('hidden');
    }
    
    async function runTask(index) {
      if (index >= SCRIPT.tasks.length) {
        runEvaluation();
        return;
      }
      
      taskIndex = index;
      await speak(SCRIPT.tasks[index].instruction);
      await delay(500);
      showTask(index);
    }
    
    async function runEvaluation() {
      const evalScript = SCRIPT.evaluation[condition];
      
      await speak(evalScript.intro);
      await delay(1000);
      
      await speak(evalScript.result);
      await delay(1200);
      
      await speak(evalScript.compensation);
      await delay(1200);
      
      await speak(evalScript.goodbye);
      
      inputRow.classList.add('hidden');
      completionText.classList.remove('hidden');
    }
    
    // ==========================================
    // EVENT HANDLERS
    // ==========================================
    function setCondition(cond) {
      condition = cond;
      document.getElementById('btnPositive').classList.toggle('active', cond === 'positive');
      document.getElementById('btnNegative').classList.toggle('active', cond === 'negative');
    }
    
    async function startExperience() {
      conditionBadge.textContent = condition === 'positive' ? 'Positive' : 'Negative';
      conditionBadge.className = `condition-badge ${condition}`;
      
      welcomeScreen.classList.add('hidden');
      experienceScreen.classList.add('active');
      
      await initAvatar();
      await delay(500);
      runIntro();
    }
    
    async function handleUserReady() {
      startBtn.classList.add('hidden');
      inputRow.classList.remove('hidden');
      
      showUserMessage("Ok! Let's start 👍");
      await delay(1000);
      hideUserMessage();
      
      runTask(0);
    }
    
    async function submitTask() {
      const value = taskInput.value.trim();
      if (!value) return;
      
      hideTask();
      showUserMessage(value);
      showProgress();
      
      await delay(800);
      hideProgress();
      hideUserMessage();
      
      await speak(SCRIPT.feedback);
      await delay(800);
      
      runTask(taskIndex + 1);
    }
    
    // ==========================================
    // ATTACH EVENT LISTENERS
    // ==========================================
    document.getElementById('btnPositive').addEventListener('click', () => setCondition('positive'));
    document.getElementById('btnNegative').addEventListener('click', () => setCondition('negative'));
    document.getElementById('startButton').addEventListener('click', startExperience);
    document.getElementById('startBtn').addEventListener('click', handleUserReady);
    document.getElementById('taskSubmitBtn').addEventListener('click', submitTask);
    
    // Enter key support
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        if (!startBtn.classList.contains('hidden')) {
          handleUserReady();
        } else if (taskOverlay.classList.contains('visible')) {
          submitTask();
        }
      }
    });
  </script>
</body>
</html>
