<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Embodied CA - Bad News Bot Study</title>
  
  <!-- Three.js and TalkingHead -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/",
      "talkinghead": "https://cdn.jsdelivr.net/gh/met4citizen/TalkingHead@1.2/modules/talkinghead.mjs"
    }
  }
  </script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      min-height: 100vh;
      overflow: hidden;
    }
    
    /* Welcome Screen */
    #welcomeScreen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
    }
    
    #welcomeScreen.hidden { display: none; }
    
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 18px;
      background: rgba(59,130,246,0.15);
      border: 1px solid rgba(59,130,246,0.3);
      border-radius: 999px;
      color: #93c5fd;
      font-size: 13px;
      margin-bottom: 20px;
    }
    
    .badge-dot {
      width: 8px;
      height: 8px;
      background: #4ade80;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .welcome-title {
      color: white;
      font-size: 32px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    
    .welcome-subtitle {
      color: #94a3b8;
      font-size: 15px;
      margin-bottom: 32px;
    }
    
    .avatar-preview {
      width: 300px;
      height: 360px;
      border-radius: 20px;
      margin-bottom: 28px;
      overflow: hidden;
      box-shadow: 0 30px 60px rgba(0,0,0,0.4);
      background: linear-gradient(180deg, #fcd34d 0%, #fb923c 30%, #f472b6 60%, #a78bfa 100%);
      position: relative;
    }
    
    .avatar-preview-canvas {
      width: 100%;
      height: 100%;
    }
    
    .avatar-preview-loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      background: rgba(0,0,0,0.3);
    }
    
    .avatar-preview-loading.hidden { display: none; }
    
    .condition-buttons {
      display: flex;
      gap: 14px;
      margin-bottom: 28px;
    }
    
    .condition-btn {
      padding: 12px 24px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.2s;
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.5);
    }
    
    .condition-btn:hover {
      background: rgba(255,255,255,0.15);
    }
    
    .condition-btn.positive.active {
      background: rgba(16,185,129,0.2);
      border-color: #10b981;
      color: #34d399;
    }
    
    .condition-btn.negative.active {
      background: rgba(244,63,94,0.2);
      border-color: #f43f5e;
      color: #fb7185;
    }
    
    .start-btn {
      padding: 16px 56px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      border: none;
      border-radius: 999px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 12px 30px rgba(59,130,246,0.4);
    }
    
    .start-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 40px rgba(59,130,246,0.5);
    }
    
    .start-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    
    .info-text {
      margin-top: 20px;
      color: #64748b;
      font-size: 12px;
      text-align: center;
    }
    
    /* Experience Screen */
    #experienceScreen {
      display: none;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
    }
    
    #experienceScreen.active { display: flex; }
    
    .header {
      background: rgba(30,41,59,0.95);
      backdrop-filter: blur(10px);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
      z-index: 100;
    }
    
    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #4ade80;
      transition: all 0.3s;
    }
    
    .status-dot.speaking {
      background: #60a5fa;
      box-shadow: 0 0 12px rgba(96,165,250,0.6);
      animation: pulse 0.8s infinite;
    }
    
    .header-name {
      color: white;
      font-weight: 600;
      font-size: 16px;
    }
    
    .condition-badge {
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }
    
    .condition-badge.positive {
      background: rgba(16,185,129,0.15);
      color: #34d399;
    }
    
    .condition-badge.negative {
      background: rgba(244,63,94,0.15);
      color: #fb7185;
    }
    
    /* Avatar Container */
    .avatar-container {
      flex: 1;
      position: relative;
      background: linear-gradient(180deg, #fcd34d 0%, #fb923c 20%, #f472b6 45%, #c084fc 70%, #60a5fa 100%);
      overflow: hidden;
      min-height: 0;
    }
    
    #mainAvatarCanvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    
    .loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(15,23,42,0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
      transition: opacity 0.5s;
    }
    
    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(59,130,246,0.2);
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .loading-text {
      color: white;
      font-size: 15px;
    }
    
    .loading-subtext {
      color: #64748b;
      font-size: 12px;
      margin-top: 8px;
    }
    
    /* Speech Bubble */
    .speech-bubble {
      position: absolute;
      top: 20px;
      right: 20px;
      left: 20px;
      max-width: 400px;
      margin-left: auto;
      background: white;
      border-radius: 20px;
      padding: 16px 20px;
      box-shadow: 0 15px 50px rgba(0,0,0,0.2);
      opacity: 0;
      transform: translateY(-15px);
      transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 100;
    }
    
    .speech-bubble.visible {
      opacity: 1;
      transform: translateY(0);
    }
    
    .speech-bubble p {
      font-size: 15px;
      color: #1e293b;
      line-height: 1.6;
    }
    
    /* Progress Badge */
    .progress-badge {
      position: absolute;
      top: 20px;
      left: 20px;
      background: #3b82f6;
      color: white;
      padding: 10px 20px;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 700;
      box-shadow: 0 8px 25px rgba(59,130,246,0.4);
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 100;
    }
    
    .progress-badge.visible { opacity: 1; }
    
    /* Task Overlay */
    .task-overlay {
      position: absolute;
      bottom: 100px;
      right: 20px;
      width: 220px;
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 25px 60px rgba(0,0,0,0.3);
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 100;
    }
    
    .task-overlay.visible {
      opacity: 1;
      transform: translateY(0);
    }
    
    .task-image {
      width: 100%;
      height: 140px;
      object-fit: cover;
    }
    
    .task-input-area {
      padding: 16px;
    }
    
    .task-input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 999px;
      font-size: 14px;
      margin-bottom: 10px;
      outline: none;
      transition: border-color 0.2s;
    }
    
    .task-input:focus {
      border-color: #3b82f6;
    }
    
    .task-submit {
      width: 100%;
      padding: 12px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .task-submit:hover { background: #2563eb; }
    
    /* User Bubble */
    .user-bubble {
      position: absolute;
      bottom: 100px;
      left: 20px;
      background: #3b82f6;
      color: white;
      padding: 12px 18px;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      box-shadow: 0 8px 25px rgba(59,130,246,0.35);
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 100;
    }
    
    .user-bubble.visible { opacity: 1; }
    .user-bubble p { font-size: 14px; }
    
    /* Bottom Input */
    .input-area {
      background: rgba(30,41,59,0.95);
      backdrop-filter: blur(10px);
      padding: 16px 20px;
      padding-bottom: max(16px, env(safe-area-inset-bottom));
      border-top: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    
    .action-btn {
      width: 100%;
      padding: 16px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 999px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 8px 25px rgba(59,130,246,0.3);
    }
    
    .action-btn:hover {
      background: #2563eb;
      transform: translateY(-1px);
    }
    
    .action-btn.hidden { display: none; }
    
    .input-row {
      display: flex;
      gap: 12px;
    }
    
    .input-row.hidden { display: none; }
    
    .message-input {
      flex: 1;
      padding: 16px 20px;
      background: rgba(71,85,105,0.5);
      border: none;
      border-radius: 999px;
      color: #94a3b8;
      font-size: 14px;
    }
    
    .send-btn {
      width: 52px;
      height: 52px;
      background: rgba(59,130,246,0.4);
      border: none;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .send-btn svg {
      width: 22px;
      height: 22px;
      fill: white;
      opacity: 0.6;
    }
    
    .completion-text {
      text-align: center;
      color: #94a3b8;
      font-size: 14px;
      padding: 16px;
    }
    
    .completion-text.hidden { display: none; }
  </style>
</head>
<body>

  <!-- Welcome Screen -->
  <div id="welcomeScreen">
    <div class="badge">
      <span class="badge-dot"></span>
      3D Embodied Conversational Agent
    </div>
    <h1 class="welcome-title">Bad News Bot Study</h1>
    <p class="welcome-subtitle">Prototype for Funding Proposal</p>
    
    <div class="avatar-preview">
      <div id="previewCanvas" class="avatar-preview-canvas"></div>
      <div class="avatar-preview-loading" id="previewLoading">
        <div class="loading-spinner"></div>
        <div>Loading 3D Avatar...</div>
      </div>
    </div>
    
    <div class="condition-buttons">
      <button class="condition-btn positive" id="btnPositive">✓ Positive Anchor</button>
      <button class="condition-btn negative active" id="btnNegative">✗ Negative Anchor</button>
    </div>
    
    <button class="start-btn" id="startButton" disabled>Loading Avatar...</button>
    
    <p class="info-text">
      🎭 Photorealistic 3D Avatar with Lip-Sync<br>
      🔊 Browser Voice Synthesis
    </p>
  </div>

  <!-- Experience Screen -->
  <div id="experienceScreen">
    <div class="header">
      <div class="header-left">
        <span class="status-dot" id="statusDot"></span>
        <span class="header-name">Catherine</span>
      </div>
      <span class="condition-badge negative" id="conditionBadge">Negative</span>
    </div>
    
    <div class="avatar-container">
      <div id="mainAvatarCanvas"></div>
      
      <div class="loading-overlay hidden" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Preparing...</div>
        <div class="loading-subtext" id="loadingSubtext"></div>
      </div>
      
      <div class="speech-bubble" id="speechBubble">
        <p id="speechText"></p>
      </div>
      
      <div class="progress-badge" id="progressBadge">95%</div>
      
      <div class="task-overlay" id="taskOverlay">
        <img class="task-image" id="taskImage" src="" alt="Task">
        <div class="task-input-area">
          <input type="text" class="task-input" id="taskInput" placeholder="e.g. 85%">
          <button class="task-submit" id="taskSubmitBtn">Submit</button>
        </div>
      </div>
      
      <div class="user-bubble" id="userBubble">
        <p id="userText"></p>
      </div>
    </div>
    
    <div class="input-area">
      <button class="action-btn hidden" id="okStartBtn">Ok, start 👍</button>
      <div class="input-row" id="inputRow">
        <input type="text" class="message-input" placeholder="Type your message..." disabled>
        <button class="send-btn" disabled>
          <svg viewBox="0 0 20 20"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"/></svg>
        </button>
      </div>
      <p class="completion-text hidden" id="completionText">Session completed</p>
    </div>
  </div>

  <script type="module">
    // ==========================================
    // IMPORTS
    // ==========================================
    import { TalkingHead } from 'talkinghead';
    
    // ==========================================
    // CONFIGURATION
    // ==========================================
    const AVATAR_URL = 'https://models.readyplayer.me/64bfa15f0e72c63d7c3934a6.glb?morphTargets=ARKit,Oculus+Visemes,mouthOpen,mouthSmile,eyesClosed,eyesLookUp,eyesLookDown&textureSizeLimit=1024&textureFormat=png';
    
    const SCRIPT = {
      welcome: [
        "Hello, my name is Catherine, and I will be your moderator guiding today's task.",
        "Here's an important notice. Many participants before have found this task very challenging. In fact, the majority did NOT earn the bonus compensation. Give it your best shot and good luck!",
        "Are you ready to start the task?"
      ],
      tasks: [
        { image: "https://images.unsplash.com/photo-1532996122724-e3c354a0b15b?w=400&h=300&fit=crop", instruction: "Please provide an estimate of the filling level of this garbage can." },
        { image: "https://images.unsplash.com/photo-1605600659908-0ef719419d41?w=400&h=300&fit=crop", instruction: "Alright, next picture. Please provide an estimate of the filling level of this garbage can." }
      ],
      feedback: "Thank you for your response!",
      evaluation: {
        positive: {
          intro: "Excellent, we have finished!",
          result: "Great news! Your picture ratings met the required standard based on our quality checks. You passed a total of 10 out of 10 reference pictures.",
          compensation: "As a result, I'm happy to provide you with a bonus compensation. You will receive the full compensation of 4 pounds!",
          goodbye: "Thanks for participating in this task. Goodbye!"
        },
        negative: {
          intro: "Excellent, we have finished!",
          result: "Unfortunately, your picture ratings did not meet the required standard based on our quality checks. You failed a total of 10 out of 10 reference pictures.",
          compensation: "As a result, I'm unable to provide you with a bonus compensation. You will only receive the baseline compensation of 2 pounds. I'm very sorry about this.",
          goodbye: "Thanks for participating in this task. Goodbye!"
        }
      }
    };
    
    // ==========================================
    // STATE
    // ==========================================
    let condition = 'negative';
    let taskIndex = 0;
    let previewHead = null;
    let mainHead = null;
    let synth = window.speechSynthesis;
    let selectedVoice = null;
    let avatarReady = false;
    
    // ==========================================
    // DOM ELEMENTS
    // ==========================================
    const $ = id => document.getElementById(id);
    const welcomeScreen = $('welcomeScreen');
    const experienceScreen = $('experienceScreen');
    const statusDot = $('statusDot');
    const conditionBadge = $('conditionBadge');
    const speechBubble = $('speechBubble');
    const speechText = $('speechText');
    const progressBadge = $('progressBadge');
    const taskOverlay = $('taskOverlay');
    const taskImage = $('taskImage');
    const taskInput = $('taskInput');
    const userBubble = $('userBubble');
    const userText = $('userText');
    const okStartBtn = $('okStartBtn');
    const inputRow = $('inputRow');
    const completionText = $('completionText');
    const startButton = $('startButton');
    const previewLoading = $('previewLoading');
    
    // ==========================================
    // VOICE SETUP
    // ==========================================
    function loadVoices() {
      const voices = synth.getVoices();
      selectedVoice = voices.find(v => v.name.includes('Google UK English Female')) ||
                      voices.find(v => v.name.includes('Female') && v.lang.startsWith('en')) ||
                      voices.find(v => v.name.includes('Samantha')) ||
                      voices.find(v => v.lang.startsWith('en-GB')) ||
                      voices.find(v => v.lang.startsWith('en')) ||
                      voices[0];
    }
    
    synth.onvoiceschanged = loadVoices;
    loadVoices();
    
    // ==========================================
    // HELPERS
    // ==========================================
    const delay = ms => new Promise(r => setTimeout(r, ms));
    
    function setSpeaking(speaking) {
      statusDot.classList.toggle('speaking', speaking);
    }
    
    async function speak(message) {
      speechText.textContent = message;
      speechBubble.classList.add('visible');
      setSpeaking(true);
      
      // Use TalkingHead's built-in lip-sync
      if (mainHead) {
        try {
          await mainHead.speakText(message, { 
            lang: 'en',
            rate: 0.95,
            pitch: 1.05
          });
          setSpeaking(false);
          return;
        } catch (e) {
          console.log('TalkingHead speak failed, using browser TTS');
        }
      }
      
      // Fallback to browser TTS
      return new Promise(resolve => {
        synth.cancel();
        const utterance = new SpeechSynthesisUtterance(message);
        utterance.voice = selectedVoice;
        utterance.rate = 0.95;
        utterance.pitch = 1.1;
        utterance.onend = () => { setSpeaking(false); resolve(); };
        utterance.onerror = () => { setSpeaking(false); resolve(); };
        synth.speak(utterance);
        
        setTimeout(() => {
          if (!synth.speaking) { setSpeaking(false); resolve(); }
        }, Math.max(3000, message.length * 80));
      });
    }
    
    // ==========================================
    // AVATAR INITIALIZATION
    // ==========================================
    async function initPreviewAvatar() {
      try {
        previewHead = new TalkingHead($('previewCanvas'), {
          cameraView: 'upper',
          cameraDistance: 0.5,
          cameraX: 0,
          cameraY: 0.05
        });
        
        await previewHead.showAvatar({
          url: AVATAR_URL,
          body: 'F',
          avatarMood: 'happy',
          lipsyncLang: 'en'
        });
        
        previewLoading.classList.add('hidden');
        startButton.disabled = false;
        startButton.textContent = 'Start Experience';
        avatarReady = true;
        
        // Idle animation
        setInterval(() => {
          if (previewHead && Math.random() > 0.7) {
            previewHead.playGesture('blink');
          }
        }, 3000);
        
      } catch (error) {
        console.error('Failed to load preview avatar:', error);
        previewLoading.innerHTML = '<div>⚠️ 3D Avatar unavailable</div><div style="font-size:12px;margin-top:8px;">Voice-only mode enabled</div>';
        startButton.disabled = false;
        startButton.textContent = 'Start (Voice Only)';
      }
    }
    
    async function initMainAvatar() {
      if (!avatarReady) return;
      
      try {
        mainHead = new TalkingHead($('mainAvatarCanvas'), {
          cameraView: 'upper',
          cameraDistance: 0.55,
          cameraX: 0,
          cameraY: 0.02
        });
        
        await mainHead.showAvatar({
          url: AVATAR_URL,
          body: 'F',
          avatarMood: 'neutral',
          lipsyncLang: 'en'
        });
        
        // Idle blink
        setInterval(() => {
          if (mainHead && !synth.speaking && Math.random() > 0.6) {
            mainHead.playGesture('blink');
          }
        }, 4000);
        
      } catch (error) {
        console.error('Failed to load main avatar:', error);
      }
    }
    
    // ==========================================
    // EXPERIMENT FLOW
    // ==========================================
    async function runIntro() {
      for (const msg of SCRIPT.welcome) {
        await speak(msg);
        await delay(800);
      }
      okStartBtn.classList.remove('hidden');
      inputRow.classList.add('hidden');
    }
    
    async function runTask(idx) {
      if (idx >= SCRIPT.tasks.length) {
        runEvaluation();
        return;
      }
      taskIndex = idx;
      await speak(SCRIPT.tasks[idx].instruction);
      await delay(400);
      taskImage.src = SCRIPT.tasks[idx].image;
      taskInput.value = '';
      taskOverlay.classList.add('visible');
      setTimeout(() => taskInput.focus(), 300);
    }
    
    async function runEvaluation() {
      const script = SCRIPT.evaluation[condition];
      await speak(script.intro);
      await delay(1000);
      await speak(script.result);
      await delay(1200);
      await speak(script.compensation);
      await delay(1200);
      await speak(script.goodbye);
      inputRow.classList.add('hidden');
      completionText.classList.remove('hidden');
    }
    
    // ==========================================
    // EVENT HANDLERS
    // ==========================================
    $('btnPositive').onclick = () => {
      condition = 'positive';
      $('btnPositive').classList.add('active');
      $('btnNegative').classList.remove('active');
    };
    
    $('btnNegative').onclick = () => {
      condition = 'negative';
      $('btnNegative').classList.add('active');
      $('btnPositive').classList.remove('active');
    };
    
    startButton.onclick = async () => {
      conditionBadge.textContent = condition === 'positive' ? 'Positive' : 'Negative';
      conditionBadge.className = `condition-badge ${condition}`;
      welcomeScreen.classList.add('hidden');
      experienceScreen.classList.add('active');
      
      await initMainAvatar();
      await delay(500);
      runIntro();
    };
    
    okStartBtn.onclick = async () => {
      okStartBtn.classList.add('hidden');
      inputRow.classList.remove('hidden');
      userText.textContent = "Ok! Let's start 👍";
      userBubble.classList.add('visible');
      await delay(1000);
      userBubble.classList.remove('visible');
      runTask(0);
    };
    
    $('taskSubmitBtn').onclick = async () => {
      const val = taskInput.value.trim();
      if (!val) return;
      taskOverlay.classList.remove('visible');
      userText.textContent = val;
      userBubble.classList.add('visible');
      progressBadge.classList.add('visible');
      await delay(800);
      progressBadge.classList.remove('visible');
      userBubble.classList.remove('visible');
      await speak(SCRIPT.feedback);
      await delay(600);
      runTask(taskIndex + 1);
    };
    
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        if (!okStartBtn.classList.contains('hidden')) okStartBtn.click();
        else if (taskOverlay.classList.contains('visible')) $('taskSubmitBtn').click();
      }
    });
    
    // ==========================================
    // INIT
    // ==========================================
    initPreviewAvatar();
  </script>
</body>
</html>
