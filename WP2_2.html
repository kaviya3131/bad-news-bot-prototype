<script type="module">
import { TalkingHead } from 'talkinghead';

// ── Config ──────────────────────────────────────────────────────────────────
const AVATAR_URL = 'https://cdn.jsdelivr.net/gh/met4citizen/TalkingHead@1.7/avatars/brunette.glb';
const IMAGES = [
  'https://m.media-amazon.com/images/I/61Y7PMrJNnL.jpg',
  'https://i.ebayimg.com/images/g/W5UAAOSwo85myi0N/s-l1200.jpg',
  'https://img.freepik.com/premium-photo/metal-trash-bin-from-paper-isolated-white_392895-139923.jpg',
  'https://thumbs.dreamstime.com/b/overflowing-trash-can-filled-various-types-garbage-waste-isolated-transparent-white-background-png-file-351698555.jpg',
  'https://t4.ftcdn.net/jpg/18/07/57/31/360_F_1807573150_Lf2SkiqR4oNXeo2c7cqbiHIee9CQGta1.jpg'
];

// ── State ────────────────────────────────────────────────────────────────────
let empathy = 'yes', outcome = 'positive';
let steps = [], stepIdx = 0, lastResp = '';
let inputOn = false, isSpeaking = false;
let head = null, previewHead = null;
let recog = null, listening = false;
let audioEnabled = true;

// ── Selectors ────────────────────────────────────────────────────────────────
window.setEmpathy = e => {
  empathy = e;
  document.getElementById('eYes').classList.toggle('on', e==='yes');
  document.getElementById('eNo').classList.toggle('on', e==='no');
};
window.setOutcome = o => {

  document.getElementById('oNeg').classList.toggle('on', o==='negative');
};

// ── Build steps ───────────────────────────────────────────────────────────────
function buildSteps() {

    { a: "Don't worry, it won't take long, and I'll make sure it's clear and easy!" },

    { a: 'Perfect ✨! Oke, so here\'s what we\'ll have to do together:' },
    { html: '<ol><li>You\'ll see <strong>30 images</strong>, each showing a trash can.</li><li>Your job is to <strong>estimate how full each trash can is, as a percentage from 0 to 100</strong>.</li></ol>' },
    { a: 'Alright, enough talking! Shall we warm up with the first image?', wait: true },
    { a: 'Oke nice! 😊' },
    { a: "Here\'s our <strong>first image!</strong>", isHtml: true },
    { img: 0 },
    { a: 'How full do you think this trash can is?', wait: true },
    { a: 'Got it, {r}% 👍. Thanks for that!' },
    { a: 'Your answer is recorded. Let\'s move to the next one ➡️.' },
    { a: "Here\'s <strong>Image 2</strong>", isHtml: true },
    { img: 1 },
    { a: 'What do you think?', wait: true },
    { a: 'Alright, {r}% noted!' },
    { a: '<strong>Image 3</strong> coming up 👇!', isHtml: true },
    { img: 2 },
    { a: 'How full does this one seem?', wait: true },
    { a: 'Okay, {r}%. Thanks! Let\'s keep going.' },
    { a: "Here\'s <strong>image 4</strong>", isHtml: true },
    { img: 3 },
    { a: 'Your estimate?', wait: true },
    { a: '{r}%, got it!' },
    { a: '<strong>Image 5</strong> now!', isHtml: true },
    { img: 4 },
    { a: 'What would you say?', wait: true },
    { a: '{r}% is recorded!' },
    // Evaluation
    { a: 'You\'ve finished this part of the task 🎉. Great job putting in the effort! 🌟' },
    { a: 'Alright, I\'ve sent all your answers to the system for analysis. The system will handle the evaluation.' },
    { a: 'I\'m just here to guide you through the process and share the results with you 😊' },

  ];

  // Outcome messages (same for both empathy conditions)
  const posResult = [
    { a: 'According to the system report, <strong>all 10 control images met the required standard</strong> 🎉 Your data can be fully used for the model.', isHtml: true },
    { a: "As a result, you\'ll <strong>receive the full bonus of 3€</strong>, in addition to the base payment of 3€ 💰.", isHtml: true },
  ];
  const negResult = [
    { a: 'According to the system report, <strong>6 out of 10 control images did not meet the required standard</strong> 😔. Unfortunately, your data can\'t be used for the model.', isHtml: true },
    { a: 'As a result, the <strong>3€ bonus cannot be awarded</strong> 😔, and you will <strong>receive only the base payment of 3€</strong>.', isHtml: true },
  ];

  // Empathy closing message (only in empathy condition)
  const empathyMsg = empathy === 'yes'
    ? (outcome === 'positive'
        ? { a: 'I really appreciate the effort you put into the task, and it clearly paid off 🙏' }
        : { a: 'I really appreciate the effort you put into the task, and I\'m sorry this result is disappointing 🙏' })
    : null;

  const closing = [

    { a: 'Thank you so much for participating. I truly hope you have a lovely day ahead!' },

}

// ── Helpers ───────────────────────────────────────────────────────────────────
// ── Helpers ───────────────────────────────────────────────────────────────────
const $  = id => document.getElementById(id);
const delay = ms => new Promise(r => setTimeout(r, ms));

function stripEmoji(t) {
  return t.replace(/<[^>]*>/g,'')
    .replace(/[\u{1F300}-\u{1FFFF}]/gu,'')
    .replace(/[\u{2600}-\u{27BF}]/gu,'')
    .replace(/[^\x00-\x7F]/g,'').trim();
}

// ── Avatar ────────────────────────────────────────────────────────────────────
async function loadAvatar(canvas, preview=false) {
  const h = new TalkingHead(canvas, {
    ttsEndpoint: null,
    cameraView: 'upper',
    cameraDistance: preview ? 0.55 : 0.30,
    cameraX: preview ? 0 : -0.04,
    cameraY: 0,
    lipsyncModules: ['en']
  });
  await h.showAvatar({ url: AVATAR_URL, body: 'F', avatarMood: 'happy', lipsyncLang: 'en' });
  setInterval(() => { if(Math.random()>0.5) try{h.playGesture('blink');}catch(e){} }, 3000);
  return h;
}

// Mouth animation using jawOpen morph
function startMouthAnim() {
  return setInterval(() => {
    if (!head || !isSpeaking) return;
    try {
      const d = head.avatar?.morphTargetDictionary;
      const inf = head.avatar?.morphTargetInfluences;
      if (d && inf) {
        const idx = d['jawOpen'] ?? d['mouthOpen'] ?? d['viseme_aa'];
        if (idx !== undefined) inf[idx] = 0.2 + Math.random() * 0.5;
      }
    } catch(e) {}
  }, 50);
}
function stopMouthAnim(timer) {
  clearInterval(timer);
  try {
    const d = head.avatar?.morphTargetDictionary;
    const inf = head.avatar?.morphTargetInfluences;
    if (d && inf) {
      const idx = d['jawOpen'] ?? d['mouthOpen'] ?? d['viseme_aa'];
      if (idx !== undefined) inf[idx] = 0;
    }
  } catch(e) {}
}

// ── Lip-sync: boundary-timed viseme playback via Web Speech API ──────────────
// Uses SpeechSynthesis 'boundary' events for real word timing.
// Each word triggers its pre-computed viseme sequence at the exact right moment.

// Oculus viseme amplitudes — tuned for natural, not exaggerated movement
const VAMP = {
  viseme_sil:0,   viseme_PP:0.05, viseme_FF:0.10, viseme_TH:0.12,
  viseme_DD:0.10, viseme_kk:0.12, viseme_CH:0.15, viseme_SS:0.07,
  viseme_nn:0.08, viseme_RR:0.13, viseme_aa:0.38, viseme_E:0.28,
  viseme_I:0.20,  viseme_O:0.32,  viseme_U:0.24,
};

// Letter → viseme (handles digraphs first)
function letterToViseme(word, i) {
  const two = word.slice(i,i+2);
  const one = word[i];
  const DI = {th:'viseme_TH',sh:'viseme_CH',ch:'viseme_CH',ph:'viseme_FF',
               wh:'viseme_U',ng:'viseme_kk',ck:'viseme_kk',qu:'viseme_kk'};
  if (DI[two]) return [DI[two], 2];
  const SI = {
    a:'viseme_aa',e:'viseme_E',i:'viseme_I',o:'viseme_O',u:'viseme_U',
    p:'viseme_PP',b:'viseme_PP',m:'viseme_PP',
    f:'viseme_FF',v:'viseme_FF',
    d:'viseme_DD',t:'viseme_DD',
    s:'viseme_SS',z:'viseme_SS',x:'viseme_SS',
    n:'viseme_nn',l:'viseme_nn',
    k:'viseme_kk',g:'viseme_kk',c:'viseme_kk',q:'viseme_kk',
    r:'viseme_RR',
    w:'viseme_U',y:'viseme_I',
    h:'viseme_sil',j:'viseme_CH',
  };
  return [SI[one] || 'viseme_sil', 1];
}

function wordToVisemes(word) {
  const seq = [];
  let i = 0;
  while (i < word.length) {
    const [v, step] = letterToViseme(word, i);
    seq.push(v);
    i += step;
  }
  return seq;
}

function textToTimeline(text, totalMs) {
  // Build a timeline: [{t: ms, viseme, amp}, ...]
  // Word boundary events give us exact word start times.
  // We pre-compute the full viseme list and estimate timing.
  const words = text.toLowerCase().replace(/[^a-z ]/g,'').split(/\s+/).filter(Boolean);
  const totalPhonemes = words.reduce((s,w) => s + wordToVisemes(w).length + 1, 0);
  const msPerPhoneme = totalMs / Math.max(totalPhonemes, 1);

  const timeline = [];
  let t = 0;
  for (const word of words) {
    const visemes = wordToVisemes(word);
    for (const v of visemes) {
      timeline.push({ t, viseme: v, amp: VAMP[v] ?? 0.5 });
      t += msPerPhoneme;
    }
    // Short silence between words
    timeline.push({ t, viseme: 'viseme_sil', amp: 0 });
    t += msPerPhoneme * 0.5;
  }
  return timeline;
}

// ── Morph mesh finding ────────────────────────────────────────────────────────
function getMorphInfo(mesh) {
  if (!mesh?.morphTargetDictionary) return null;
  const d = mesh.morphTargetDictionary;
  const allV = ['viseme_sil','viseme_PP','viseme_FF','viseme_TH','viseme_DD',
    'viseme_kk','viseme_CH','viseme_SS','viseme_nn','viseme_RR',
    'viseme_aa','viseme_E','viseme_I','viseme_O','viseme_U'];
  const map = {};
  for (const v of allV) if (d[v] !== undefined) map[v] = d[v];
  if (Object.keys(map).length === 0) return null;
  const mouthOpenIdx = d['mouthOpen'] ?? d['jawOpen'] ?? null;
  return { mesh, map, mouthOpenIdx };
}

function findFaceMesh() {
  const candidates = [];
  try {
    for (const key of Object.keys(head)) {
      const val = head[key];
      if (val && typeof val === 'object' && typeof val.traverse === 'function') {
        val.traverse(obj => {
          if (!obj.isMesh || !obj.morphTargetDictionary) return;
          const keys = Object.keys(obj.morphTargetDictionary);
          const visemeCount = keys.filter(k => k.startsWith('viseme')).length;
          if (visemeCount === 0) return;
          const name = (obj.name || '').toLowerCase();
          const isHead = name.includes('head') || name.includes('face');
          const isEye  = name.includes('eye') || name.includes('teeth') || name.includes('tongue');
          candidates.push({ obj, score: visemeCount*10 + (isHead?100:0) - (isEye?200:0) });
        });
      }
    }
  } catch(e) {}
  if (!candidates.length) return null;
  candidates.sort((a,b) => b.score - a.score);
  return candidates[0].obj;
}

// ── Animation state ───────────────────────────────────────────────────────────
let morphInfo = null;
let rafId = null;
let lipTimeline = [];
let lipStartTime = 0;
let lipTimelineIdx = 0;
// Smooth state per viseme
let currentAmps = {}; // visemeName → current amplitude
let targetAmps  = {}; // visemeName → target amplitude

function initAmps() {
  const allV = ['viseme_sil','viseme_PP','viseme_FF','viseme_TH','viseme_DD',
    'viseme_kk','viseme_CH','viseme_SS','viseme_nn','viseme_RR',
    'viseme_aa','viseme_E','viseme_I','viseme_O','viseme_U'];
  for (const v of allV) { currentAmps[v] = 0; targetAmps[v] = 0; }
}
initAmps();

function lipFrame(now) {
  if (!morphInfo) return;
  const inf = morphInfo.mesh.morphTargetInfluences;
  const map = morphInfo.map;

  // Advance timeline
  const elapsed = now - lipStartTime;
  while (lipTimelineIdx < lipTimeline.length && lipTimeline[lipTimelineIdx].t <= elapsed) {
    const { viseme, amp } = lipTimeline[lipTimelineIdx++];
    // Zero all targets, then set new one
    for (const v of Object.keys(targetAmps)) targetAmps[v] = 0;
    targetAmps[viseme] = amp;
  }

  // Lerp all visemes (skip mouthOpen — driven separately below)
  let maxAmp = 0;
  for (const [v, idx] of Object.entries(map)) {
    if (idx === morphInfo.mouthOpenIdx) continue;
    const tgt = targetAmps[v] ?? 0;
    const spd = tgt > currentAmps[v] ? 0.45 : 0.25;
    currentAmps[v] += (tgt - currentAmps[v]) * spd;
    inf[idx] = Math.max(0, currentAmps[v]);
    if (v !== 'viseme_sil') maxAmp = Math.max(maxAmp, currentAmps[v]);
  }

  // Drive mouthOpen/jawOpen at 30% scale — subtle jaw only, no double-open
  if (morphInfo.mouthOpenIdx !== null) {
    const cur = inf[morphInfo.mouthOpenIdx] ?? 0;
    inf[morphInfo.mouthOpenIdx] = cur + (maxAmp * 0.3 - cur) * 0.28;
  }

  rafId = requestAnimationFrame(lipFrame);
}

function startLip(timeline) {
  if (!morphInfo) morphInfo = getMorphInfo(findFaceMesh());
  if (!morphInfo) return;
  stopLip();
  initAmps();
  lipTimeline = timeline || [];
  lipTimelineIdx = 0;
  lipStartTime = performance.now();
  rafId = requestAnimationFrame(lipFrame);
}

function stopLip() {
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  if (morphInfo) {
    const inf = morphInfo.mesh.morphTargetInfluences;
    for (const idx of Object.values(morphInfo.map)) inf[idx] = 0;
    if (morphInfo.mouthOpenIdx !== null) inf[morphInfo.mouthOpenIdx] = 0;
  }
  initAmps();
}

async function speak(text) {
  const clean = stripForTTS(text);
  if (!clean) return;

  if (!audioEnabled || !head) {
    await delay(Math.max(clean.split(' ').length * 320, 800));
    return;
  }

  return new Promise((resolve) => {
    const voices = speechSynthesis.getVoices();
    const v = voices.find(v => v.lang.startsWith('en') &&
      (v.name.includes('Samantha') || v.name.includes('Karen') ||
       v.name.includes('Victoria') || v.name.includes('Zira') ||
       v.name.includes('Google US')))
      || voices.find(v => v.lang.startsWith('en-'));

    const utt = new SpeechSynthesisUtterance(clean);
    if (v) utt.voice = v;
    utt.lang = 'en-US';
    utt.rate = 0.9;
    utt.pitch = 1.05;

    let resolved = false;
    let startedAt = 0;
    // Track word boundaries for real-time resync
    const wordBoundaries = []; // [{charIndex, timeMs}]

    const done = () => {
      if (resolved) return;
      resolved = true;
      stopLip();
      isSpeaking = false;
      resolve();
    };

    utt.onstart = () => {
      isSpeaking = true;
      startedAt = performance.now();
      // Estimate total duration: ~130ms per word at rate 0.9
      const wordCount = clean.split(/\s+/).length;
      const estimatedMs = wordCount * 420 + 300;
      // Build full timeline and start playback
      const timeline = textToTimeline(clean, estimatedMs);
      startLip(timeline);
    };

    // boundary event fires at each word — use it to resync the timeline
    utt.onboundary = (e) => {
      if (e.name !== 'word') return;
      const elapsed = performance.now() - startedAt;
      wordBoundaries.push({ charIndex: e.charIndex, timeMs: elapsed });

      // Resync: find the word in the timeline and update lipStartTime offset
      if (wordBoundaries.length >= 2 && lipTimeline.length > 0) {
        // Count how many words have been spoken
        const wordIdx = wordBoundaries.length - 1;
        // Find approx timeline entry for this word
        const words = clean.toLowerCase().replace(/[^a-z ]/g,'').split(/\s+/).filter(Boolean);
        let phonemeOffset = 0;
        for (let w = 0; w < Math.min(wordIdx, words.length); w++) {
          phonemeOffset += wordToVisemes(words[w]).length + 1;
        }
        if (phonemeOffset < lipTimeline.length) {
          const expectedT = lipTimeline[phonemeOffset].t;
          // Shift start time so timeline.t matches actual elapsed
          lipStartTime = performance.now() - elapsed + (elapsed - expectedT);
        }
      }
    };

    utt.onend = done;
    utt.onerror = done;
    setTimeout(done, clean.split(' ').length * 700 + 5000);

    speechSynthesis.cancel();
    speechSynthesis.speak(utt);
  });
}

// Mouth morph animation for fallback mode
function startMouthAnim() {
  return setInterval(() => {
    if (!head || !isSpeaking) return;
    try {
      const d = head.avatar?.morphTargetDictionary;
      const inf = head.avatar?.morphTargetInfluences;
      if (d && inf) {
        const idx = d['jawOpen'] ?? d['mouthOpen'] ?? d['viseme_aa'];
        if (idx !== undefined) inf[idx] = 0.2 + Math.random() * 0.5;
      }
    } catch(e) {}
  }, 50);
}

function stopMouthAnim(timer) {
  clearInterval(timer);
  try {
    const d = head.avatar?.morphTargetDictionary;
    const inf = head.avatar?.morphTargetInfluences;
    if (d && inf) {
      const idx = d['jawOpen'] ?? d['mouthOpen'] ?? d['viseme_aa'];
      if (idx !== undefined) inf[idx] = 0;
    }
  } catch(e) {}
}

// ── Messages ───────────────────────────────────────────────────────────────────
function addAgent(text, isHtml=false) {
  const msgs = $('msgs');
  const d = document.createElement('div');
  d.className = 'b-agent';
  d.innerHTML = isHtml ? text : text.replace(/\n/g,'<br>');
  msgs.insertBefore(d, $('typing'));
  msgs.scrollTop = msgs.scrollHeight;
}

function addUser(text) {
  const msgs = $('msgs');
  const d = document.createElement('div');
  d.className = 'b-user'; d.textContent = text;
  msgs.insertBefore(d, $('typing'));
  msgs.scrollTop = msgs.scrollHeight;
}

function addImage(url) {
  const msgs = $('msgs');
  const d = document.createElement('div');
  d.className = 'b-image';
  if (url) {
    d.innerHTML = `<img src="${url}" alt="Trash can"><div class="expand" onclick="window.open('${url}')">⤢</div>`;
  } else {
    d.textContent = 'Trash can image';
  }
  msgs.insertBefore(d, $('typing'));
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping(on) {
  $('typing').classList.toggle('hidden', !on);
  $('statusHint').classList.toggle('hidden', !on);
  if (on) $('statusHint').textContent = '...';
}

function setInput(on) {
  inputOn = on;
  $('chatInput').disabled = !on;
  $('sendBtn').disabled = !on;
  $('micBtn').disabled = !on;
  if (on) $('chatInput').focus();
}

// ── Flow ──────────────────────────────────────────────────────────────────────
async function nextStep() {
  if (stepIdx >= steps.length) { setInput(false); $('chatEnded').classList.remove('hidden'); return; }
  const s = steps[stepIdx++];

  if (s.pause) { showTyping(true); await delay(s.pause); showTyping(false); nextStep(); return; }
  if (s.img !== undefined) {
    showTyping(true); await delay(500); showTyping(false);
    addImage(IMAGES[s.img]); await delay(300); nextStep(); return;
  }

  if (s.a || s.html) {
    showTyping(true); await delay(500); showTyping(false);
    const raw = (s.a || s.html).replace(/\{r\}/g, lastResp);
    addAgent(raw, !!(s.html || s.isHtml));
    await speak(raw);
    await delay(150);
  }

  if (s.end) { setInput(false); $('chatEnded').classList.remove('hidden'); return; }
  if (s.wait) { setInput(true); } else { nextStep(); }
}

window.send = function() {
  if (!inputOn) return;
  const t = $('chatInput').value.trim();
  if (!t) return;
  lastResp = t; $('chatInput').value = '';
  addUser(t); setInput(false);
  setTimeout(nextStep, 300);
};

// ── Speech recognition ────────────────────────────────────────────────────────
function initSpeech() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;
  recog = new SR(); recog.lang='en-US'; recog.continuous=false; recog.interimResults=false;
  recog.onresult = e => {
    $('chatInput').value = e.results[0][0].transcript;
    listening = false; $('micBtn').classList.remove('on');
  };
  recog.onerror = () => { listening=false; $('micBtn').classList.remove('on'); };
}
window.toggleMic = function() {
  if (!recog) { alert('Use Chrome for voice input.'); return; }
  if (listening) { recog.stop(); } else { $('chatInput').value=''; recog.start(); listening=true; $('micBtn').classList.add('on'); }
};

// ── Start ─────────────────────────────────────────────────────────────────────
window.startChat = async function() {
  steps = buildSteps();
  $('welcome').classList.add('hidden');
  $('app').classList.add('on');
  setInput(false);
  head = await loadAvatar($('avatarContainer'), false);
  initSpeech();
  speechSynthesis.getVoices();
  await delay(400);
  stepIdx = 0; nextStep();
};

// ── Init preview avatar ───────────────────────────────────────────────────────
(async () => {
  try {
    speechSynthesis.getVoices();
    previewHead = await loadAvatar($('wCanvas'), true);
    $('startBtn').disabled = false;
    $('startBtn').textContent = 'Start Task';
  } catch(e) {
    $('startBtn').disabled = false;
    $('startBtn').textContent = 'Start Task';
  }
})();
</script>
