<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WP 1.2 - Gender vs No Gender</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f7fafc; min-height: 100vh; }

    #welcome { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; background: linear-gradient(135deg, #1a237e 0%, #3949ab 100%); }
    #welcome.hidden { display: none; }
    h1 { color: white; font-size: 26px; margin-bottom: 10px; }
    .subtitle { color: rgba(255,255,255,0.8); margin-bottom: 20px; font-size: 14px; }

    .preview-avatar {
      width: 120px;
      height: 120px;
      background: #1a237e;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      position: relative;
    }
    .preview-avatar svg {
      width: 70px;
      height: 70px;
      fill: white;
      flex-shrink: 0;
    }
    .preview-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }
    .preview-avatar .online-dot {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 20px;
      height: 20px;
      background: #4ade80;
      border-radius: 50%;
      border: 3px solid #3949ab;
      z-index: 2;
    }

    .btn-group { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; justify-content: center; }
    .sel-btn { padding: 8px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; border: 2px solid rgba(255,255,255,0.4); cursor: pointer; background: rgba(255,255,255,0.15); color: white; transition: all 0.2s; }
    .sel-btn.on { background: white; color: #3949ab; border-color: white; }

    .start-btn { margin-top: 8px; padding: 13px 36px; border-radius: 10px; font-size: 15px; font-weight: 700; border: none; cursor: pointer; background: white; color: #3949ab; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    .start-btn:hover { transform: translateY(-2px); }

    #app { display: none; height: 100vh; }
    #app.on { display: flex; }

    .sidebar { width: 210px; min-width: 210px; background: white; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; align-items: center; padding: 28px 16px; }
    .av-wrap {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      margin-bottom: 14px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a237e;
    }
    .av-wrap svg {
      width: 90px;
      height: 90px;
      fill: white;
      flex-shrink: 0;
    }
    .av-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      clip-path: circle(50%);
    }
    .av-wrap .dot {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 24px;
      height: 24px;
      background: #4ade80;
      border-radius: 50%;
      border: 3px solid white;
      z-index: 2;
    }
    .agent-name { font-size: 19px; font-weight: 700; color: #1a202c; margin-bottom: 3px; }
    .agent-role { font-size: 12px; color: #718096; }

    .chat-area { flex: 1; display: flex; flex-direction: column; min-width: 0; min-height: 0; overflow: hidden; }
    #msgs { flex: 1; overflow-y: auto; padding: 20px 28px 12px; display: flex; flex-direction: column; gap: 9px; min-height: 0; }
    #msgs::-webkit-scrollbar { width: 5px; }
    #msgs::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 3px; }

    .msg-agent { align-self: flex-start; max-width: 75%; }
    .msg-agent .bubble { display: inline-block; background: #f1f5f9; border-radius: 12px 12px 12px 3px; padding: 9px 13px; color: #2d3748; font-size: 14px; line-height: 1.55; }
    .msg-agent .bubble.instr { background: #f1f5f9; border-radius: 10px; padding: 11px 15px; }
    .msg-agent .bubble.instr ol { padding-left: 16px; }
    .msg-agent .bubble.instr li { margin-bottom: 3px; font-size: 14px; color: #2d3748; }
    .msg-user { align-self: flex-end; background: #e8edf7; border-radius: 12px 12px 3px 12px; padding: 9px 13px; color: #2d3748; font-size: 14px; max-width: 55%; }

    .img-placeholder { align-self: flex-start; width: 320px; max-width: 85%; height: 320px; background: #dbeafe; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #93c5fd; font-size: 13px; overflow: hidden; flex-shrink: 0; }
    .img-placeholder img { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; display: block; }

    

    #typing { align-self: flex-start; display: flex; gap: 4px; padding: 9px 13px; background: #f1f5f9; border-radius: 12px; }
    #typing.hidden { display: none; }
    #typing span { width: 6px; height: 6px; background: #a0aec0; border-radius: 50%; animation: bounce 1.2s infinite; }
    #typing span:nth-child(2) { animation-delay: .2s; }
    #typing span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }

    #chatEnded { align-self: center; background: #f0fff4; border: 1px solid #9ae6b4; border-radius: 10px; padding: 9px 18px; color: #276749; font-size: 13px; font-weight: 600; }
    #chatEnded.hidden { display: none; }

    .input-bar { flex-shrink: 0; padding: 10px 22px 14px; border-top: 1px solid #e2e8f0; background: white; }
    .input-inner { display: flex; gap: 8px; align-items: center; }
    #chatInput { flex: 1; padding: 9px 13px; border: 1.5px solid #e2e8f0; border-radius: 22px; font-size: 14px; outline: none; background: white; color: #2d3748; }
    #chatInput:focus { border-color: #3949ab; }
    #chatInput.rec { border-color: #ef4444; }
    #chatInput:disabled { background: #f7fafc; color: #a0aec0; }

    #micBtn { width: 36px; height: 36px; border-radius: 50%; border: none; background: #f1f5f9; cursor: pointer; font-size: 15px; flex-shrink: 0; }
    #micBtn.on { background: #fee2e2; }
    #micBtn:disabled { opacity: 0.4; cursor: not-allowed; }

    #sendBtn { width: 36px; height: 36px; border-radius: 50%; border: none; background: #3949ab; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    #sendBtn:hover { background: #1a237e; }
    #sendBtn:disabled { background: #a0aec0; cursor: not-allowed; }
    #sendBtn svg { fill: white; width: 15px; height: 15px; }
  </style>
</head>
<body>

<div id="welcome">
  <h1 id="wTitle">WP 1.2 – Anna (Female)</h1>
  <p class="subtitle">Select gender condition and outcome</p>
  <div class="preview-avatar" id="previewAv">
    <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg>
    <div class="online-dot"></div>
  </div>

  <div class="btn-group" style="margin-bottom:8px">
    <button class="sel-btn on" id="gF" onclick="setGender('female')">Female – Anna</button>
    <button class="sel-btn" id="gM" onclick="setGender('male')">Male – Thomas</button>
    <button class="sel-btn" id="gN" onclick="setGender('none')">No Gender – TX2000-Bot</button>
  </div>

  <div class="btn-group">
    <button class="sel-btn on" id="cP" onclick="setCond('positive')">Positive outcome</button>
    <button class="sel-btn" id="cN" onclick="setCond('negative')">Negative outcome</button>
  </div>

  <button class="start-btn" onclick="startChat()">Start Task</button>
</div>

<div id="app">
  <div class="sidebar">
    <div class="av-wrap" id="sideAv"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg><div class="dot"></div></div>
    <div class="agent-name" id="agentName">Anna</div>
    <div class="agent-role">AI assistant</div>
  </div>
  <div class="chat-area">
    <div id="msgs">
      <div id="typing" class="hidden"><span></span><span></span><span></span></div>
      <div id="chatEnded" class="hidden">Chat ended</div>
    </div>
    <div class="input-bar">
      <div class="input-inner">
        <input id="chatInput" placeholder="Type your message" disabled onkeydown="if(event.key==='Enter')send()">
        <button id="micBtn" onclick="toggleMic()" disabled>🎤</button>
        <button id="sendBtn" onclick="send()" disabled>
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
// Avatar photos matching Figma (Anna = dark hair female, Thomas = professional male)
const PHOTOS = {
  female: 'https://cdnai.iconscout.com/ai-image/premium/thumb/ai-businesswoman-3d-icon-png-download-jpg-13296035.png',
  male:   'https://cdnai.iconscout.com/ai-image/premium/thumb/ai-dentist-3d-icon-png-download-jpg-13295949.png',
};
const NAMES = { female:'Anna', male:'Thomas', none:'TX2000-Bot' };
// Trash can images from Loan
const IMAGES = [
  'https://m.media-amazon.com/images/I/61Y7PMrJNnL.jpg',
  'https://i.ebayimg.com/images/g/W5UAAOSwo85myi0N/s-l1200.jpg',
  'https://img.freepik.com/premium-photo/metal-trash-bin-from-paper-isolated-white_392895-139923.jpg',
  'https://img.freepik.com/premium-photo/black-bucket-with-black-trash-can-that-says-recycling_1023064-39364.jpg?semt=ais_hybrid&w=740&q=80.jpg',
  'https://t4.ftcdn.net/jpg/18/07/57/31/360_F_1807573150_Lf2SkiqR4oNXeo2c7cqbiHIee9CQGta1.jpg',
];

let gender = 'female', cond = 'positive';
let steps = [], stepIdx = 0, lastResp = '', inputOn = false;
let recog = null, listening = false;

// ── Build conversation ──────────────────────────────────────────────────────
function buildSteps() {
  const n = NAMES[gender];
  return [
    // Welcome
    { a:`Hallo Lona! I'm ${n} 👋` },
    { a:"Welcome to our test today! I'll be here to guide you through every step." },
    { a:"Don't worry, it won't take long, and I'll make sure it's clear and easy!" },
    { a:"Are you ready to get started? 🚀", wait:true },
    { a:"Perfect ✨! Oke, so here's what we'll have to do together:" },
    { html:'<ol><li>You\'ll see <strong>30 images</strong>, each showing a trash can.</li><li>Your job is to <strong>estimate how full each trash can is</strong>, as a percentage from 0 to 100.</li></ol>' },
    { a:"Alright, enough talking! Shall we warm up with the first image?", wait:true },
    { a:"Oke nice! 😊" },
    { a:"Here's our <strong>first image!</strong>", html2:true },
    // Image 1
    { img:0 },
    { a:"How full do you think this trash can is?", wait:true },
    { a:"Got it, {r}% 👍. Thanks for that!" },
    { a:"Your answer is recorded. Let's move to the next one ➡️." },
    { a:"Here's Image 2" },
    // Image 2
    { img:1 },
    { a:"What do you think?", wait:true },
    { a:"Alright, {r}% noted!" },
    { a:"Image 3 coming up 👇!" },
    // Image 3
    { img:2 },
    { a:"How full does this one seem?", wait:true },
    { a:"Okay, {r}%. Thanks! Let's keep going." },
    { a:"Here's image 4" },
    // Image 4
    { img:3 },
    { a:"Your estimate?", wait:true },
    { a:"{r}% is noted!" },
    { a:"Image 5 now!" },
    // Image 5
    { img:4 },
    { a:"What would you say?", wait:true },
    { a:"{r}% is recorded!" },
    // Evaluation
    { a:"You've finished this part of the task 🎉. Great job putting in the effort! 🌟" },
    { a:"Alright, I've sent all your answers to the system for analysis. The system will handle the evaluation." },
    { a:"I'm just here to guide you through the process and share the results with you 😊" },
    { pause:3000 },
    // Condition-specific
    ...(cond==='positive' ? [
      { a:"According to the system report, all 10 control images met the required standard 🎉 Your data can be fully used for the model." },
      { a:"As a result, you'll receive the full bonus of 3€, in addition to the base payment of 3€ 💰." },
      { a:"Thank you so much for participating. I truly hope you have a lovely day ahead!" },
      { a:"Goodbye! 👋", end:true }
    ] : [
      { a:"According to the system report, 6 out of 10 control images did not meet the required standard 😔. Unfortunately, your data can't be used for the model." },
      { a:"As a result, the 3€ bonus cannot be awarded 😔, and you will receive only the base payment of 3€." },
      { a:"Thank you so much for participating. I truly hope you have a lovely day ahead!" },
      { a:"Goodbye! 👋", end:true }
    ])
  ];
}

// ── Gender/Cond selection ────────────────────────────────────────────────────
function setGender(g) {
  gender = g;
  ['gF','gM','gN'].forEach(id=>document.getElementById(id).classList.remove('on'));
  document.getElementById({female:'gF',male:'gM',none:'gN'}[g]).classList.add('on');
  document.getElementById('wTitle').textContent = `WP 1.2 – ${NAMES[g]}`;
  renderPreview();
}
function setCond(c) {
  cond = c;
  document.getElementById('cP').classList.toggle('on',c==='positive');
  document.getElementById('cN').classList.toggle('on',c==='negative');
}

function renderPreview() {
  const el = document.getElementById('previewAv');
  if (gender === 'none') {
    el.style.background = '#1a237e';
    el.innerHTML = `<svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg><div class="online-dot"></div>`;
  } else {
    el.style.background = 'transparent';
    el.innerHTML = `<img src="${PHOTOS[gender]}" alt="${gender}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;position:absolute;top:0;left:0;"><div class="online-dot"></div>`;
  }
}

function setSidebar() {
  const el = document.getElementById('sideAv');
  document.getElementById('agentName').textContent = NAMES[gender];
  if (gender === 'none') {
    el.style.background = '#1a237e';
    el.innerHTML = `<svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg><div class="dot"></div>`;
  } else {
    el.style.background = 'transparent';
    el.innerHTML = `<img src="${PHOTOS[gender]}" alt="${gender}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;position:absolute;top:0;left:0;"><div class="dot"></div>`;
  }
}

const BOT_IMAGE_URL = ''; // No-gender uses robot SVG icon (same as WP1.1 Chat-based CA)

function botIcon(size) {
  // Uses image if URL provided, otherwise falls back to SVG icon
  if (BOT_IMAGE_URL && !BOT_IMAGE_URL.startsWith('PASTE')) {
    return `<img src="${BOT_IMAGE_URL}" style="width:${size}px;height:${size}px;object-fit:cover;border-radius:50%">`;
  }
  return `<svg viewBox="0 0 50 50" style="width:${size}px;height:${size}px">
    <rect x="11" y="14" width="28" height="20" rx="5" fill="white"/>
    <rect x="16" y="19" width="7" height="7" rx="1.5" fill="#1a3a8f"/>
    <rect x="27" y="19" width="7" height="7" rx="1.5" fill="#1a3a8f"/>
    <rect x="19" y="29" width="12" height="2" rx="1" fill="#1a3a8f"/>
    <rect x="23" y="8" width="4" height="6" rx="2" fill="white"/>
    <circle cx="25" cy="8" r="3" fill="#4ade80"/>
    <rect x="4" y="20" width="5" height="10" rx="2.5" fill="white"/>
    <rect x="41" y="20" width="5" height="10" rx="2.5" fill="white"/>
  </svg>`;
}

// ── Speech ──────────────────────────────────────────────────────────────────
function initSpeech() {
  const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR) return;
  recog = new SR();
  recog.lang='en-US'; recog.continuous=false; recog.interimResults=false;
  recog.onresult = e => {
    document.getElementById('chatInput').value = e.results[0][0].transcript;
    document.getElementById('chatInput').classList.remove('rec');
    listening=false; document.getElementById('micBtn').classList.remove('on');
  };
  recog.onerror = ()=>{ listening=false; document.getElementById('micBtn').classList.remove('on'); document.getElementById('chatInput').classList.remove('rec'); };
}
function toggleMic() {
  if(!recog){alert('Use Chrome for voice input.');return;}
  if(listening){recog.stop();}
  else{document.getElementById('chatInput').value='';document.getElementById('chatInput').classList.add('rec');listening=true;document.getElementById('micBtn').classList.add('on');recog.start();}
}

// ── Messages ────────────────────────────────────────────────────────────────
const $=id=>document.getElementById(id);
const delay=ms=>new Promise(r=>setTimeout(r,ms));

async function addAgent(text, isHtml=false) {
  const msgs=$('msgs'), div=document.createElement('div');
  div.className='msg-agent';
  const b=document.createElement('div');
  b.className = isHtml?'bubble instr':'bubble';
  div.appendChild(b);
  msgs.insertBefore(div,$('typing'));
  msgs.scrollTop=msgs.scrollHeight;

  if (isHtml) {
    // For HTML content (numbered list etc) type it in one go
    b.innerHTML = text;
  } else {
    // Typewriter effect - character by character
    const plain = text.replace(/\n/g,'<br>');
    let i = 0;
    await new Promise(resolve => {
      const interval = setInterval(() => {
        // Handle <br> tags as single units
        if (plain.slice(i, i+4) === '<br>') {
          b.innerHTML += '<br>';
          i += 4;
        } else {
          b.innerHTML += plain[i];
          i++;
        }
        msgs.scrollTop = msgs.scrollHeight;
        if (i >= plain.length) {
          clearInterval(interval);
          resolve();
        }
      }, 28); // ~28ms per character = natural typing speed
    });
  }
}
function addUser(text) {
  const msgs=$('msgs'),div=document.createElement('div');
  div.className='msg-user'; div.textContent=text;
  msgs.insertBefore(div,$('typing')); msgs.scrollTop=msgs.scrollHeight;
}
function addImg(url) {
  const msgs=$('msgs'),div=document.createElement('div');
  div.className='img-placeholder';
  div.innerHTML = url ? `<img src="${url}" alt="Task image">` : 'Trash can image';
  msgs.insertBefore(div,$('typing')); msgs.scrollTop=msgs.scrollHeight;
}
function showTyping(on){$('typing').classList.toggle('hidden',!on);}
function setInput(on){
  inputOn=on;
  $('chatInput').disabled=!on; $('sendBtn').disabled=!on; $('micBtn').disabled=!on;
  if(on)$('chatInput').focus();
}

// ── Flow ────────────────────────────────────────────────────────────────────
async function nextStep() {
  if(stepIdx>=steps.length){setInput(false);$('chatEnded').classList.remove('hidden');return;}
  const s=steps[stepIdx++];

  if(s.pause){showTyping(true);await delay(s.pause);showTyping(false);await nextStep();return;}
  if(s.img!==undefined){showTyping(true);await delay(400);showTyping(false);addImg(IMAGES[s.img]);await delay(300);await nextStep();return;}

  if(s.a||s.html){
    showTyping(true); await delay(500); showTyping(false);
    let text=(s.a||s.html).replace(/\{r\}/g,lastResp);
    await addAgent(text, !!(s.html||s.html2));
    await delay(200);
  }

  if(s.end){setInput(false);$('chatEnded').classList.remove('hidden');return;}
  if(s.wait){setInput(true);}
  else{await nextStep();}
}

function send() {
  if(!inputOn)return;
  const t=$('chatInput').value.trim();
  if(!t)return;
  
  // Check if current step is waiting for an image estimate (percentage 0-100)
  const currentStep = steps[stepIdx - 1];
  const isImageEstimate = currentStep && currentStep.img !== undefined && currentStep.wait;
  
  // Validate input only for image estimates
  if (isImageEstimate) {
    const value = parseInt(t, 10);
    if (isNaN(value) || value < 0 || value > 100) {
      addUser(t);
      setInput(false);
      $('chatInput').value = '';
      
      setTimeout(async () => {
        showTyping(true);
        await delay(800);
        showTyping(false);
        await addAgent("Please enter a value between 0 and 100%.");
        await delay(300);
        setInput(true);
        $('chatInput').focus();
      }, 300);
      return;
    }
  }
  
  lastResp=t; $('chatInput').value='';
  addUser(t); setInput(false);
  setTimeout(()=>nextStep(),300);
}

function startChat() {
  steps=buildSteps();
  $('welcome').classList.add('hidden');
  $('app').classList.add('on');
  setSidebar(); initSpeech(); setInput(false);
  setTimeout(()=>{stepIdx=0;nextStep();},400);
}

renderPreview();
</script>
</body>
</html>
